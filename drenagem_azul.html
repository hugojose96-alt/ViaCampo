<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Via Campo — Drenagem Superficial</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a2070;font-family:'Segoe UI',sans-serif;color:#fff;min-height:100vh}
.header{background:#1e277a;padding:12px 28px;border-bottom:2px solid #3d48c0;display:flex;align-items:center;justify-content:space-between}
.logo-box{display:flex;align-items:center;gap:10px}
.logo-img{height:50px;border-radius:6px}
.sub{font-size:11px;color:#a0aadd;letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.header-right{text-align:right;font-size:12px;color:#a0aadd}
.header-right strong{display:block;color:#e8c040;font-size:14px}
.page-title{background:#182060;padding:6px 28px;font-size:10px;color:#5060a0;letter-spacing:2px;text-transform:uppercase;border-bottom:1px solid #2d38b0}
.body{padding:20px 28px}
.status-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;font-size:12px}
.status-dot{width:8px;height:8px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.status-text{color:#a0aadd}
.refresh-btn{margin-left:auto;background:rgba(232,192,64,0.15);color:#e8c040;border:1px solid rgba(232,192,64,0.4);border-radius:6px;padding:5px 14px;font-size:11px;cursor:pointer;font-family:'Segoe UI',sans-serif;font-weight:600;transition:all .2s}
.refresh-btn:hover{background:rgba(232,192,64,0.3)}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.kpi{background:#1e277a;border-radius:10px;padding:14px 16px;border:1px solid #3d48c0}
.kpi-label{font-size:10px;color:#a0aadd;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.kpi-value{font-size:22px;font-weight:700;color:#fff}
.kpi-value span{font-size:12px;font-weight:400;color:#a0aadd;margin-left:3px}
.kpi-badge{display:inline-block;margin-top:4px;font-size:10px;padding:2px 8px;border-radius:20px}
.badge-blue{background:rgba(96,165,250,0.15);color:#93c5fd}
.badge-gold{background:rgba(232,192,64,0.15);color:#e8c040}
.badge-green{background:rgba(74,222,128,0.15);color:#4ade80}
.badge-purple{background:rgba(167,139,250,0.15);color:#a78bfa}
.filters{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;align-items:center;background:#1e277a;padding:12px 16px;border-radius:8px;border:1px solid #3d48c0}
.filter-label{font-size:10px;color:#a0aadd;font-weight:700;letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
.filter-select{background:#2B34A0;color:#fff;border:1px solid #4d5cd0;border-radius:7px;padding:5px 10px;font-size:12px;outline:none;cursor:pointer;font-family:'Segoe UI',sans-serif}
.filter-select:focus{border-color:#e8c040}
.filter-clear{background:transparent;color:#7888c0;border:1px solid #3d48c0;border-radius:7px;padding:5px 12px;font-size:11px;cursor:pointer;font-family:'Segoe UI',sans-serif;transition:all .2s}
.filter-clear:hover{background:#2d38b0;color:#fff}
.filter-count{margin-left:auto;font-size:10px;color:#5060a0}
.charts-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.chart-box{background:#1e277a;border-radius:10px;padding:16px 18px;border:1px solid #3d48c0;margin-bottom:14px}
.chart-title{font-size:12px;font-weight:600;color:#d0d8f0;letter-spacing:.5px;text-transform:uppercase;margin-bottom:2px}
.chart-sub{font-size:10px;color:#7888c0;margin-bottom:10px}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px}
.legend span{display:flex;align-items:center;gap:4px;font-size:10px;color:#a0aadd}
.ldot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
/* Tabela scroll fixo */
.table-wrap{overflow-y:auto;max-height:320px;border-radius:6px}
.table-wrap::-webkit-scrollbar{width:6px;height:6px}
.table-wrap::-webkit-scrollbar-track{background:#1a2070}
.table-wrap::-webkit-scrollbar-thumb{background:#3d48c0;border-radius:3px}
table{width:100%;border-collapse:collapse;font-size:11px}
thead th{background:#16206a;color:#a0aadd;padding:7px 10px;text-align:left;border-bottom:2px solid #2d38b0;font-weight:600;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;position:sticky;top:0;z-index:2}
td{padding:6px 10px;border-bottom:1px solid rgba(255,255,255,0.05);color:#d0d8f0;white-space:nowrap}
tr:hover td{background:rgba(255,255,255,0.04)}
.badge-sm{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:600}
.b-r1{background:rgba(96,165,250,0.2);color:#93c5fd}
.b-r2{background:rgba(232,192,64,0.2);color:#e8c040}
.b-r3{background:rgba(74,222,128,0.2);color:#4ade80}
.b-leve{background:rgba(74,222,128,0.2);color:#4ade80}
.b-medio{background:rgba(251,146,60,0.2);color:#fb923c}
.b-alto{background:rgba(248,113,113,0.2);color:#f87171}
.loading{display:flex;align-items:center;justify-content:center;height:200px;flex-direction:column;gap:10px;color:#7888c0;font-size:13px}
.spinner{width:32px;height:32px;border:3px solid #2d38b0;border-top-color:#e8c040;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{text-align:center;padding:10px;font-size:11px;color:#8898cc;border-top:1px solid #2d38b0;margin-top:4px;letter-spacing:.5px}
.empty{text-align:center;padding:40px;color:#5060a0;font-size:13px}
.reti-wrap{position:relative;overflow-x:auto}
.tt-reti{position:absolute;background:#0f1850ee;border:1px solid #3d48c0;border-radius:7px;padding:8px 12px;font-size:11px;color:#e0e8ff;pointer-events:none;display:none;z-index:20;white-space:nowrap;line-height:1.7;box-shadow:0 4px 16px rgba(0,0,0,.4)}
</style>
</head>
<body>
<div class="header">
  <div class="logo-box">
    <img class="logo-img" id="hLogo" alt="Via Campo">
    <div><div class="sub">Plano de Ação</div></div>
  </div>
  <div class="header-right"><strong id="hDate">—</strong>Planejamento de Obras</div>
</div>
<div class="page-title">Drenagem Superficial — Dados ao vivo da planilha</div>
<div class="body">
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Conectando...</span>
    <button class="refresh-btn" onclick="loadData()">↻ Atualizar</button>
  </div>
  <div id="mainContent"><div class="loading"><div class="spinner"></div>Carregando...</div></div>
</div>
<div class="footer">Via Campo Concessão Rodoviária</div>

const CSV_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRIH_aAgMAgTnZIFe7mEFx2WxNrZhytatBF5mSveVmhYKLRiq88LXYMQr9RggAnBSwseN-2t-AXPJTi/pub?gid=269296572&single=true&output=csv';
// Colunas: A=0,B=1,C=2(Serviço),D=3(kmIni),E=4(kmFin),F=5(Medida),G=6(Sentido),H=7(Rodovia),I=8(Regional),J=9(Grau)
const COL={SRV:2,KMI:3,KMF:4,MED:5,SEN:6,ROD:7,REG:8,J:9};
let DATA=null,charts={};
let F={rod:'all',reg:'all',j:'all'};
const CORES=['#60a5fa','#e8c040','#4ade80','#f87171','#a78bfa','#fb923c'],GC='rgba(255,255,255,0.07)',TC='#8898cc';
function fmtBR(n){return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,'.');}
const CREG={'Regional 1':'#60a5fa','Regional 2':'#e8c040','Regional 3':'#4ade80','Regional 4':'#f87171'};

function splitLine(l){const r=[];let c='',q=false;for(let i=0;i<l.length;i++){const ch=l[i];if(ch==='"'){if(q&&l[i+1]==='"'){c+='"';i++;}else q=!q;}else if(ch===','&&!q){r.push(c.trim());c='';}else c+=ch;}r.push(c.trim());return r;}

function parseNum(s){
  if(!s||s.trim()==='')return 0;
  const c=s.replace(/[^\d,\.]/g,'');
  if(c.includes(',')&&c.includes('.'))return parseFloat(c.replace(/\./g,'').replace(',','.'))||0;
  if(c.includes(','))return parseFloat(c.replace(',','.'))||0;
  return parseFloat(c)||0;
}

function parseCSV(txt){
  const lines=txt.replace(/\r\n/g,'\n').replace(/\r/g,'\n').trim().split('\n');
  if(lines.length<2)return{rows:[],header:'m'};
  const hdr=splitLine(lines[0]);
  const unidade=hdr[COL.MED]||'m';
  const rows=[];
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim())continue;
    const c=splitLine(lines[i]);
    const rod=c[COL.ROD]||'',reg=c[COL.REG]||'',srv=c[COL.SRV]||'';
    if(!rod||!reg||!srv)continue;
    const med=parseNum(c[COL.MED]);
    rows.push({servico:srv,medida:med,kmIni:parseNum(c[COL.KMI]),kmFin:parseNum(c[COL.KMF]),sentido:c[COL.SEN]||'',rodovia:rod,regional:reg,j:c[COL.J]||''});
  }
  return{rows,header:unidade};
}

async function loadData(){
  setStatus(true,'Carregando...');
  document.getElementById('mainContent').innerHTML='<div class="loading"><div class="spinner"></div>Carregando dados...</div>';
  const proxies=[CSV_URL,'https://corsproxy.io/?'+encodeURIComponent(CSV_URL),'https://api.allorigins.win/raw?url='+encodeURIComponent(CSV_URL)];
  for(const url of proxies){
    try{
      const res=await fetch(url);
      if(!res.ok)continue;
      const txt=await res.text();
      const d=parseCSV(txt);
      if(d.rows.length>0){DATA=d;setStatus(true,'Atualizado '+new Date().toLocaleTimeString('pt-BR')+' — '+d.rows.length+' registros');render();return;}
    }catch(e){console.warn(e.message);}
  }
  setStatus(false,'Erro ao carregar dados.');
  document.getElementById('mainContent').innerHTML='<div class="empty">Não foi possível carregar.<br>Verifique a publicação da planilha.</div>';
}

function setStatus(ok,msg){document.getElementById('statusDot').style.background=ok?'#4ade80':'#f87171';document.getElementById('statusText').textContent=msg;}
function getFiltered(){let r=DATA.rows;if(F.rod!=='all')r=r.filter(x=>x.rodovia===F.rod);if(F.reg!=='all')r=r.filter(x=>x.regional===F.reg);if(F.j!=='all')r=r.filter(x=>x.j===F.j);return r;}
function agg(rows,key){return rows.reduce((m,r)=>{m[r[key]]=(m[r[key]]||0)+r.medida;return m;},{});}
function destroyCharts(){Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});charts={};}

function buildReti(canvasId,rows){
  const canvas=document.getElementById(canvasId);
  if(!canvas)return;
  const dpr=window.devicePixelRatio||1;
  const W=canvas.parentElement.offsetWidth||700;
  const H=240;
  canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+'px';canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
  const ML=70,MR=20,MT=20,MB=45,CW=W-ML-MR,CH=H-MT-MB;
  const kms=rows.flatMap(r=>[r.kmIni,r.kmFin]).filter(v=>v>0);
  if(!kms.length){ctx.fillStyle='#5060a0';ctx.font='12px Segoe UI';ctx.textAlign='center';ctx.fillText('Sem dados de km disponíveis',W/2,H/2);return;}
  const KM0=Math.floor(Math.min(...kms)),KM1=Math.ceil(Math.max(...kms)),KMR=KM1-KM0||1;
  const toX=km=>ML+((km-KM0)/KMR)*CW;
  ctx.clearRect(0,0,W,H);
  // Grid
  const step=Math.ceil(KMR/10)||1;
  ctx.setLineDash([3,4]);ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;
  for(let k=KM0;k<=KM1;k+=step){const x=toX(k);ctx.beginPath();ctx.moveTo(x,MT);ctx.lineTo(x,MT+CH);ctx.stroke();}
  ctx.setLineDash([]);
  // Rodovias
  const rodovias=[...new Set(rows.map(r=>r.rodovia))].sort();
  const totalRods=rodovias.length;
  const faixaTotal=CH-20;
  const faixaH=Math.min(40,Math.floor(faixaTotal/totalRods)-8);
  const faixaGap=Math.floor(faixaTotal/totalRods);
  rodovias.forEach((rod,ri)=>{
    const yBase=MT+10+ri*faixaGap;
    const yMid=yBase+faixaH/2;
    // Label
    ctx.fillStyle='#93c5fd';ctx.font='bold 10px Segoe UI';ctx.textAlign='end';
    ctx.fillText(rod,ML-6,yMid+4);
    // Faixa central da rodovia (asfalto)
    const roadH=6;
    ctx.fillStyle='rgba(255,255,255,0.12)';
    ctx.fillRect(ML,yMid-roadH/2,CW,roadH);
    ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=0.5;
    ctx.strokeRect(ML,yMid-roadH/2,CW,roadH);
    // Linha central tracejada
    ctx.setLineDash([8,6]);ctx.strokeStyle='rgba(232,192,64,0.4)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(ML,yMid);ctx.lineTo(ML+CW,yMid);ctx.stroke();
    ctx.setLineDash([]);
    // Serviços
    const rowsRod=rows.filter(r=>r.rodovia===rod);
    rowsRod.forEach(r=>{
      if(!r.kmIni&&!r.kmFin)return;
      const x0=toX(r.kmIni),x1=toX(r.kmFin),bw=Math.max(x1-x0,3);
      const dec=r.sentido.toLowerCase().includes('dec');
      const cor=dec?'#f87171':'#60a5fa';
      const yOff=dec?roadH/2+1:-(faixaH/2+1);
      const bh=faixaH/2-2;
      // Barra do serviço
      ctx.fillStyle=cor+'bb';
      ctx.beginPath();ctx.roundRect(x0,yMid+yOff,bw,bh,3);ctx.fill();
      ctx.strokeStyle=cor;ctx.lineWidth=1;
      ctx.beginPath();ctx.roundRect(x0,yMid+yOff,bw,bh,3);ctx.stroke();
      // Seta
      if(bw>20){
        ctx.fillStyle='#fff';ctx.font='bold 10px Segoe UI';ctx.textAlign='center';
        ctx.fillText(dec?'←':'→',x0+bw/2,yMid+yOff+bh/2+4);
      }
    });
    // Labels sentido
    ctx.font='9px Segoe UI';ctx.textAlign='start';ctx.fillStyle='#93c5fd';
    ctx.fillText('Crescente →',ML+2,yMid-faixaH/2-roadH/2+9);
    ctx.fillStyle='#f87171';
    ctx.fillText('← Decrescente',ML+2,yMid+faixaH+roadH/2-2);
  });
  // Eixo
  ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(ML,MT+CH);ctx.lineTo(ML+CW,MT+CH);ctx.stroke();
  for(let k=KM0;k<=KM1;k+=step){
    const x=toX(k);
    ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,MT+CH);ctx.lineTo(x,MT+CH+4);ctx.stroke();
    ctx.fillStyle='#7888c0';ctx.font='9px Segoe UI';ctx.textAlign='center';
    ctx.fillText('km '+k.toFixed(0),x,MT+CH+14);
  }
  ctx.fillStyle='#5060a0';ctx.font='9px Segoe UI';ctx.textAlign='center';
  ctx.fillText('Quilometragem',ML+CW/2,H-4);
  // Tooltip
  const tt=document.getElementById('tt-reti');
  canvas.onmousemove=function(e){
    const rect=canvas.getBoundingClientRect();
    const mx=e.clientX-rect.left;
    const km=KM0+((mx-ML)/CW)*KMR;
    const hit=rows.find(r=>km>=r.kmIni&&km<=r.kmFin);
    if(hit&&mx>=ML&&mx<=ML+CW){
      tt.innerHTML=`<strong style="color:#e8c040">km ${hit.kmIni.toFixed(3)} – ${hit.kmFin.toFixed(3)}</strong><br>Serviço: ${hit.servico}<br>Sentido: ${hit.sentido}<br>Rodovia: ${hit.rodovia}<br>Regional: ${hit.regional}<br>Grau: <span style="color:${hit.j==='Alto'?'#f87171':hit.j==='Médio'||hit.j==='Medio'?'#fb923c':'#4ade80'}">${hit.j}</span><br>Medida: ${fmtBR(hit.medida)} m`;
      tt.style.display='block';
      tt.style.left=(mx+14)+'px';
      tt.style.top=(e.clientY-rect.top-10)+'px';
    }else tt.style.display='none';
  };
  canvas.onmouseleave=()=>tt.style.display='none';
}

function render(){
  destroyCharts();
  if(!DATA?.rows?.length){document.getElementById('mainContent').innerHTML='<div class="empty">Sem dados.</div>';return;}
  const rows=DATA.rows,un=DATA.header||'m';
  const fil=getFiltered();
  const rods=[...new Set(rows.map(r=>r.rodovia))].sort();
  const regs=[...new Set(rows.map(r=>r.regional))].sort();
  const jVals=[...new Set(rows.map(r=>r.j).filter(Boolean))].sort();
  // KPIs: soma APENAS coluna F (medida)
  const totalMed=rows.reduce((a,r)=>a+r.medida,0);
  const filtMed=fil.reduce((a,r)=>a+r.medida,0);
  const byRod=agg(fil,'rodovia'),byReg=agg(fil,'regional');
  const byRodReg={};fil.forEach(r=>{if(!byRodReg[r.rodovia])byRodReg[r.rodovia]={};byRodReg[r.rodovia][r.regional]=(byRodReg[r.rodovia][r.regional]||0)+r.medida;});
  const rodList=Object.keys(byRod).sort(),regList=[...new Set(fil.map(r=>r.regional))].sort();

  document.getElementById('mainContent').innerHTML=`
  <div class="kpi-row">
    <div class="kpi"><div class="kpi-label">Total ${un}</div><div class="kpi-value">${fmtBR(totalMed)} <span>${un}</span></div><div class="kpi-badge badge-blue">${rows.length} registros</div></div>
    <div class="kpi"><div class="kpi-label">Filtrado ${un}</div><div class="kpi-value">${fmtBR(filtMed)} <span>${un}</span></div><div class="kpi-badge badge-gold">${fil.length} registros</div></div>
    <div class="kpi"><div class="kpi-label">Rodovias</div><div class="kpi-value">${rods.length} <span>rodovias</span></div><div class="kpi-badge badge-green">${rods.join(', ')}</div></div>
    <div class="kpi"><div class="kpi-label">Regionais</div><div class="kpi-value">${regs.length} <span>regionais</span></div><div class="kpi-badge badge-purple">${regs.join(' · ')}</div></div>
  </div>

  <div class="filters">
    <span class="filter-label">Filtros:</span>
    <select class="filter-select" id="fRod" onchange="applyF()">
      <option value="all">Todas as rodovias</option>
      ${rods.map(r=>`<option value="${r}"${F.rod===r?' selected':''}>${r}</option>`).join('')}
    </select>
    <select class="filter-select" id="fReg" onchange="applyF()">
      <option value="all">Todas as regionais</option>
      ${regs.map(r=>`<option value="${r}"${F.reg===r?' selected':''}>${r}</option>`).join('')}
    </select>
    <select class="filter-select" id="fJ" onchange="applyF()">
      <option value="all">Todos os graus</option>
      ${jVals.map(v=>`<option value="${v}"${F.j===v?' selected':''}>${v}</option>`).join('')}
    </select>
    <button class="filter-clear" onclick="clearF()">Limpar</button>
    <span class="filter-count">${fil.length} de ${rows.length} registros</span>
  </div>

  <div class="chart-box">
    <div class="chart-title">Retigráfico — Perfil Horizontal da Rodovia</div>
    <div class="chart-sub">Azul = Crescente (→) &nbsp;|&nbsp; Vermelho = Decrescente (←) &nbsp;|&nbsp; Passe o mouse para detalhes</div>
    <div class="reti-wrap">
      <div class="tt-reti" id="tt-reti"></div>
      <canvas id="retiCanvas" role="img" aria-label="Retigráfico">Retigráfico dos trechos de serviço.</canvas>
    </div>
  </div>

  <div class="charts-grid-2">
    <div class="chart-box" style="margin-bottom:0">
      <div class="chart-title">Por Rodovia e Regional</div>
      <div class="chart-sub">Total de ${un} agrupado por rodovia e regional</div>
      <div class="legend" id="leg1"></div>
      <div style="position:relative;height:220px"><canvas id="cRodReg">.</canvas></div>
    </div>
    <div class="chart-box" style="margin-bottom:0">
      <div class="chart-title">Proporção por Regional</div>
      <div class="chart-sub">Distribuição percentual entre regionais</div>
      <div style="position:relative;height:220px"><canvas id="cPie">.</canvas></div>
    </div>
  </div>
  <div class="chart-box" style="margin-top:14px">
    <div class="chart-title">Comparativo por Rodovia</div>
    <div class="chart-sub">Total de ${un} por rodovia</div>
    <div style="position:relative;height:180px"><canvas id="cRod">.</canvas></div>
  </div>

  <div class="chart-box">
    <div class="chart-title">Detalhamento Completo</div>
    <div class="chart-sub">Tabela com scroll — ${fil.length} registros filtrados</div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Rodovia</th><th>Regional</th><th>Serviço</th><th>Sentido</th><th>km Ini</th><th>km Fin</th><th>Grau</th><th style="text-align:right">${un}</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>`;

  requestAnimationFrame(()=>buildReti('retiCanvas',fil));

  // Legenda
  const leg1=document.getElementById('leg1');
  regList.forEach((reg,i)=>{const cor=CREG[reg]||CORES[i%CORES.length];leg1.innerHTML+=`<span><span class="ldot" style="background:${cor}"></span>${reg}</span>`;});

  // Barras agrupadas
  charts.rr=new Chart(document.getElementById('cRodReg'),{type:'bar',data:{labels:rodList,datasets:regList.map((reg,i)=>{const cor=CREG[reg]||CORES[i%CORES.length];return{label:reg,data:rodList.map(r=>byRodReg[r]?.[reg]||0),backgroundColor:cor+'cc',borderColor:cor,borderWidth:1.5,borderRadius:4};})},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${fmtBR(c.parsed.y)} ${un}`}}},scales:{x:{ticks:{color:TC,font:{size:11}},grid:{color:GC}},y:{ticks:{color:TC,font:{size:11}},grid:{color:GC},beginAtZero:true}}}});

  // Rosca
  const rc=regList.map((r,i)=>CREG[r]||CORES[i%CORES.length]);
  charts.pie=new Chart(document.getElementById('cPie'),{type:'doughnut',data:{labels:regList,datasets:[{data:regList.map(r=>byReg[r]||0),backgroundColor:rc.map(c=>c+'cc'),borderColor:rc,borderWidth:1.5}]},options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{position:'right',labels:{color:TC,font:{size:11},boxWidth:12,padding:10}},tooltip:{callbacks:{label:c=>`${c.label}: ${fmtBR(c.parsed)} ${un}`}}}}});

  // Rodovias
  const rc2=rodList.map((_,i)=>CORES[i%CORES.length]);
  charts.rod=new Chart(document.getElementById('cRod'),{type:'bar',data:{labels:rodList,datasets:[{data:rodList.map(r=>byRod[r]||0),backgroundColor:rc2.map(c=>c+'cc'),borderColor:rc2,borderWidth:1.5,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${fmtBR(c.parsed.y)} ${un}`}}},scales:{x:{ticks:{color:TC,font:{size:11}},grid:{color:GC}},y:{ticks:{color:TC,font:{size:11}},grid:{color:GC},beginAtZero:true}}}});

  // Tabela
  const tbody=document.getElementById('tbody');
  fil.forEach(r=>{
    const rc=r.regional==='Regional 1'?'b-r1':r.regional==='Regional 2'?'b-r2':'b-r3';
    const jc=r.j==='Alto'?'b-alto':r.j==='Médio'||r.j==='Medio'?'b-medio':'b-leve';
    tbody.innerHTML+=`<tr><td><span class="badge-sm ${rc}">${r.rodovia}</span></td><td>${r.regional}</td><td>${r.servico}</td><td>${r.sentido}</td><td>${r.kmIni.toFixed(3)}</td><td>${r.kmFin.toFixed(3)}</td><td><span class="badge-sm ${jc}">${r.j}</span></td><td style="text-align:right;font-weight:600;color:#e8c040">${fmtBR(r.medida)} ${un}</td></tr>`;
  });
}

function applyF(){F.rod=document.getElementById('fRod').value;F.reg=document.getElementById('fReg').value;F.j=document.getElementById('fJ').value;render();}
function clearF(){F={rod:'all',reg:'all',j:'all'};render();}
loadData();
</script>
</body>
</html>
