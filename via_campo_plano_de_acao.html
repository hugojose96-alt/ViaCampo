<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Via Campo — Drenagem & Sinalização</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#1a2070;font-family:'Segoe UI',sans-serif;color:#fff;min-height:100vh}
  .header{background:#1e277a;padding:12px 28px;border-bottom:2px solid #3d48c0;display:flex;align-items:center;justify-content:space-between}
  .logo-box{display:flex;align-items:center;gap:10px}
  .logo-img{height:50px;border-radius:6px}
  .logo-text .sub{font-size:11px;color:#a0aadd;letter-spacing:2px;text-transform:uppercase;margin-top:2px}
  .header-right{text-align:right;font-size:12px;color:#a0aadd}
  .header-right strong{display:block;color:#e8c040;font-size:14px}
  .tabs{display:flex;background:#1e277a;border-bottom:2px solid #3d48c0;padding:0 28px}
  .tab{padding:12px 24px;font-size:13px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;color:#7888c0;transition:all .2s;letter-spacing:.5px;text-transform:uppercase}
  .tab.active{color:#e8c040;border-bottom-color:#e8c040}
  .tab:hover:not(.active){color:#c0c8e8}
  .body{padding:20px 28px}
  .status-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;font-size:12px}
  .status-dot{width:8px;height:8px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .status-text{color:#a0aadd}
  .refresh-btn{margin-left:auto;background:rgba(232,192,64,0.15);color:#e8c040;border:1px solid rgba(232,192,64,0.4);border-radius:6px;padding:4px 12px;font-size:11px;cursor:pointer;font-family:'Segoe UI',sans-serif;font-weight:600;transition:all .2s}
  .refresh-btn:hover{background:rgba(232,192,64,0.3)}
  .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
  .kpi{background:#1e277a;border-radius:10px;padding:14px 16px;border:1px solid #3d48c0}
  .kpi-label{font-size:10px;color:#a0aadd;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
  .kpi-value{font-size:24px;font-weight:700;color:#fff}
  .kpi-value span{font-size:13px;font-weight:400;color:#a0aadd;margin-left:3px}
  .kpi-badge{display:inline-block;margin-top:4px;font-size:10px;padding:2px 8px;border-radius:20px}
  .badge-blue{background:rgba(96,165,250,0.15);color:#93c5fd}
  .badge-gold{background:rgba(232,192,64,0.15);color:#e8c040}
  .badge-green{background:rgba(74,222,128,0.15);color:#4ade80}
  .badge-purple{background:rgba(167,139,250,0.15);color:#a78bfa}
  .filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
  .filter-label{font-size:12px;color:#a0aadd;white-space:nowrap}
  .filter-select{background:#2B34A0;color:#fff;border:1px solid #4d5cd0;border-radius:7px;padding:5px 10px;font-size:12px;outline:none;cursor:pointer;font-family:'Segoe UI',sans-serif}
  .filter-select:focus{border-color:#e8c040}
  .filter-clear{background:transparent;color:#7888c0;border:1px solid #3d48c0;border-radius:7px;padding:5px 12px;font-size:11px;cursor:pointer;font-family:'Segoe UI',sans-serif;transition:all .2s}
  .filter-clear:hover{background:#2d38b0;color:#fff}
  .charts-grid-top{display:grid;grid-template-columns:1.4fr 1fr;gap:14px;margin-bottom:14px}
  .charts-grid-bot{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
  .chart-box{background:#1e277a;border-radius:10px;padding:16px 18px;border:1px solid #3d48c0}
  .chart-title{font-size:12px;font-weight:600;color:#d0d8f0;letter-spacing:.5px;text-transform:uppercase;margin-bottom:2px}
  .chart-sub{font-size:10px;color:#7888c0;margin-bottom:12px}
  .legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px}
  .legend span{display:flex;align-items:center;gap:4px;font-size:10px;color:#a0aadd}
  .ldot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
  .table-wrap{overflow-x:auto;margin-top:4px}
  table{width:100%;border-collapse:collapse;font-size:11px}
  th{background:#16206a;color:#a0aadd;padding:7px 10px;text-align:left;border-bottom:1px solid #2d38b0;font-weight:600;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
  td{padding:6px 10px;border-bottom:1px solid rgba(255,255,255,0.05);color:#d0d8f0}
  tr:hover td{background:rgba(255,255,255,0.03)}
  .badge-rod{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:600}
  .r1{background:rgba(96,165,250,0.2);color:#93c5fd}
  .r2{background:rgba(232,192,64,0.2);color:#e8c040}
  .r3{background:rgba(74,222,128,0.2);color:#4ade80}
  .loading{display:flex;align-items:center;justify-content:center;height:200px;flex-direction:column;gap:10px;color:#7888c0;font-size:13px}
  .spinner{width:32px;height:32px;border:3px solid #2d38b0;border-top-color:#e8c040;border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .footer{text-align:center;padding:12px;font-size:11px;color:#c0c8e8;border-top:1px solid #2d38b0;margin-top:8px;font-weight:500;letter-spacing:.5px}
  .empty{text-align:center;padding:40px;color:#5060a0;font-size:13px}
  .page-ind{font-size:10px;color:#5060a0;text-align:center;padding:3px 0;background:#182060;margin-bottom:14px;border-radius:4px;letter-spacing:1px}
  .error-box{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);border-radius:8px;padding:16px;margin-bottom:14px;font-size:12px;color:#fca5a5}
  .error-box strong{display:block;margin-bottom:6px;color:#f87171}
</style>
</head>
<body>

<div class="header">
  <div class="logo-box">
    <img class="logo-img" id="hLogo" alt="Via Campo">
    <div class="logo-text"><div class="sub">Plano de Ação</div></div>
  </div>
  <div class="header-right">
    <strong id="hDate">—</strong>
    Planejamento de Obras
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('drenagem',this)">Drenagem Superficial</div>
  <div class="tab" onclick="switchTab('sinalizacao',this)">Sin. Horizontal</div>
</div>

<div class="body">
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Conectando à planilha...</span>
    <button class="refresh-btn" onclick="loadAll()">↻ Atualizar dados</button>
  </div>
  <div id="mainContent">
    <div class="loading"><div class="spinner"></div>Carregando dados da planilha...</div>
  </div>
</div>

<div class="footer">Via Campo Concessão Rodoviária</div>

  drenagem: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRIH_aAgMAgTnZIFe7mEFx2WxNrZhytatBF5mSveVmhYKLRiq88LXYMQr9RggAnBSwseN-2t-AXPJTi/pub?gid=269296572&single=true&output=csv',
  sinalizacao: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRIH_aAgMAgTnZIFe7mEFx2WxNrZhytatBF5mSveVmhYKLRiq88LXYMQr9RggAnBSwseN-2t-AXPJTi/pub?gid=206273543&single=true&output=csv'
};

let allData = { drenagem: null, sinalizacao: null };
let charts = {};
let activeTab = 'drenagem';
let activeFilters = { rodovia: 'all', regional: 'all' };

const CORES_ROD = ['#60a5fa','#e8c040','#4ade80','#f87171','#a78bfa','#fb923c','#34d399','#f472b6'];
const CORES_REG = { 'Regional 1':'#60a5fa','Regional 2':'#e8c040','Regional 3':'#4ade80','Regional 4':'#f87171' };
const GC = 'rgba(255,255,255,0.07)', TC = '#8898cc';

// ─── Parse CSV ───────────────────────────────────────────────────────────────
// Parser CSV robusto — trata campos com aspas, vírgulas internas e \r\n
function splitCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (ch === ',' && !inQ) {
      result.push(cur.trim()); cur = '';
    } else {
      cur += ch;
    }
  }
  result.push(cur.trim());
  return result;
}

function parseCSV(text) {
  // Normaliza quebras de linha
  const lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').trim().split('\n');
  if (lines.length < 2) return { rows: [], header: 'm' };

  const header = splitCSVLine(lines[0]);
  console.log('[CSV] Cabeçalho detectado:', header);
  console.log('[CSV] Total de linhas:', lines.length);

  // Detecta índices pelo cabeçalho (case-insensitive, fallback para posição fixa)
  const hi = (terms) => {
    const idx = header.findIndex(h => terms.some(t => h.toLowerCase().includes(t.toLowerCase())));
    return idx;
  };

  // Índices fixos conforme estrutura da planilha:
  // A=0 Data, B=1 Equipe, C=2 Serviço, D=3 km inicial, E=4 km final, F=5 Metragem, G=6 Sentido, H=7 Rodovia, I=8 Regional
  const iSrvF = 2; // Coluna C — Serviço
  const iMedF = 5; // Coluna F — Metragem (m)
  const iRodF = 7; // Coluna H — Rodovia
  const iRegF = 8; // Coluna I — Regional

  const unidade = header[iMedF] || 'm';
  console.log(`[CSV] Colunas: serviço=${iSrvF}, medida=${iMedF}(${unidade}), rodovia=${iRodF}, regional=${iRegF}`);

  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const cols = splitCSVLine(lines[i]);
    const servico  = cols[iSrvF] || '';
    const medStr   = (cols[iMedF] || '0').replace(/\./g,'').replace(',','.');
    const medida   = parseFloat(medStr) || 0;
    const rodovia  = cols[iRodF] || '';
    const regional = cols[iRegF] || '';
    if (rodovia && regional && servico) {
      rows.push({ servico, medida, rodovia, regional });
    }
  }
  console.log(`[CSV] Linhas válidas: ${rows.length}`);
  if (rows.length > 0) console.log('[CSV] Exemplo linha 1:', rows[0]);
  return { rows, header: unidade };
}

function setStatus(ok, msg) {
  document.getElementById('statusDot').style.background = ok ? '#4ade80' : '#f87171';
  document.getElementById('statusText').textContent = msg;
}

async function fetchCSV(url) {
  if (!url || url.includes('URL_AQUI')) return null;

  // Tenta fetch direto primeiro
  try {
    console.log('[FETCH] Tentando direto:', url.substring(0,80));
    const res = await fetch(url);
    console.log('[FETCH] Status:', res.status, '| Type:', res.type);
    if (res.ok) {
      const text = await res.text();
      console.log('[FETCH] Bytes:', text.length, '| Inicio:', text.substring(0,100));
      const parsed = parseCSV(text);
      if (parsed.rows.length > 0) return parsed;
      console.warn('[FETCH] Rows=0, tentando proxy...');
    }
  } catch(e) {
    console.warn('[FETCH] Direto falhou:', e.message);
  }

  // Fallback via proxies publicos sem CORS
  const proxies = [
    'https://corsproxy.io/?' + encodeURIComponent(url),
    'https://api.allorigins.win/raw?url=' + encodeURIComponent(url)
  ];
  for (const proxy of proxies) {
    try {
      console.log('[FETCH] Proxy:', proxy.substring(0,80));
      const res = await fetch(proxy);
      if (res.ok) {
        const text = await res.text();
        console.log('[FETCH] Proxy OK, bytes:', text.length);
        const parsed = parseCSV(text);
        if (parsed.rows.length > 0) return parsed;
      }
    } catch(e) {
      console.warn('[FETCH] Proxy falhou:', e.message);
    }
  }
  throw new Error('Nao foi possivel carregar. Verifique publicacao da planilha.');
}

async function loadAll() {
  setStatus(true, 'Atualizando...');
  document.getElementById('mainContent').innerHTML = '<div class="loading"><div class="spinner"></div>Carregando dados da planilha...</div>';
  try {
    const [dr, si] = await Promise.allSettled([
      fetchCSV(CSV_URLS.drenagem),
      fetchCSV(CSV_URLS.sinalizacao)
    ]);
    if (dr.status === 'fulfilled' && dr.value) allData.drenagem = dr.value;
    if (si.status === 'fulfilled' && si.value) allData.sinalizacao = si.value;
    const total = (allData.drenagem?.rows?.length||0) + (allData.sinalizacao?.rows?.length||0);
    setStatus(true, `Dados atualizados — ${new Date().toLocaleTimeString('pt-BR')} — ${total} registros`);
    renderTab();
  } catch(e) {
    setStatus(false, 'Erro ao carregar: ' + e.message);
    document.getElementById('mainContent').innerHTML = `<div class="empty">Erro ao carregar dados.<br><small>${e.message}</small></div>`;
  }
}

function switchTab(tab, el) {
  activeTab = tab;
  activeFilters = { rodovia:'all', regional:'all' };
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderTab();
}

function getFiltered() {
  const data = allData[activeTab];
  if (!data?.rows) return [];
  let rows = data.rows;
  if (activeFilters.rodovia !== 'all') rows = rows.filter(r => r.rodovia === activeFilters.rodovia);
  if (activeFilters.regional !== 'all') rows = rows.filter(r => r.regional === activeFilters.regional);
  return rows;
}

function agg(rows, key) {
  return rows.reduce((m,r) => { m[r[key]] = (m[r[key]]||0) + r.medida; return m; }, {});
}

function destroyCharts() {
  Object.values(charts).forEach(c => { try{c.destroy()}catch(e){} });
  charts = {};
}

function renderTab() {
  destroyCharts();
  const data = allData[activeTab];
  const tabLabel = activeTab === 'drenagem' ? 'Drenagem Superficial' : 'Sin. Horizontal';

  // Sin. Horizontal ainda sem URL
  if (activeTab === 'sinalizacao' && CSV_URLS.sinalizacao.includes('URL_AQUI')) {
    document.getElementById('mainContent').innerHTML = `
      <div class="error-box">
        <strong>Sin. Horizontal — aguardando URL</strong>
        Assim que você publicar a aba como CSV e fornecer o link, os dados aparecerão automaticamente aqui.
      </div>`;
    return;
  }

  if (!data?.rows?.length) {
    document.getElementById('mainContent').innerHTML = '<div class="empty">Sem dados disponíveis.<br>Verifique se a planilha está publicada como CSV.</div>';
    return;
  }

  const rows = data.rows;
  const unidade = data.header || 'm';
  const filtered = getFiltered();
  const rodovias = [...new Set(rows.map(r=>r.rodovia))].sort();
  const regionais = [...new Set(rows.map(r=>r.regional))].sort();

  const totalMed = rows.reduce((a,r)=>a+r.medida,0);
  const filtMed  = filtered.reduce((a,r)=>a+r.medida,0);

  const byRod = agg(filtered,'rodovia');
  const byReg = agg(filtered,'regional');
  const bySrv = agg(filtered,'servico');
  const byRodReg = {};
  filtered.forEach(r => {
    if(!byRodReg[r.rodovia]) byRodReg[r.rodovia]={};
    byRodReg[r.rodovia][r.regional] = (byRodReg[r.rodovia][r.regional]||0) + r.medida;
  });

  const rodList = Object.keys(byRod).sort();
  const regList = [...new Set(filtered.map(r=>r.regional))].sort();
  const srvList = Object.keys(bySrv).sort();

  document.getElementById('mainContent').innerHTML = `
  <div class="page-ind">${tabLabel.toUpperCase()} — DADOS AO VIVO DA PLANILHA</div>

  <div class="kpi-row">
    <div class="kpi">
      <div class="kpi-label">Total ${unidade} (planilha)</div>
      <div class="kpi-value">${totalMed.toLocaleString('pt-BR')} <span>${unidade}</span></div>
      <div class="kpi-badge badge-blue">${rows.length} registros</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Filtrado / Exibido</div>
      <div class="kpi-value">${filtMed.toLocaleString('pt-BR')} <span>${unidade}</span></div>
      <div class="kpi-badge badge-gold">${filtered.length} registros</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Rodovias</div>
      <div class="kpi-value">${rodovias.length} <span>rodovias</span></div>
      <div class="kpi-badge badge-green">${rodovias.join(', ')}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Regionais</div>
      <div class="kpi-value">${regionais.length} <span>regionais</span></div>
      <div class="kpi-badge badge-purple">${regionais.join(' · ')}</div>
    </div>
  </div>

  <div class="filters">
    <span class="filter-label">Filtrar por:</span>
    <select class="filter-select" id="fRod" onchange="applyFilter()">
      <option value="all">Todas as rodovias</option>
      ${rodovias.map(r=>`<option value="${r}"${activeFilters.rodovia===r?' selected':''}>${r}</option>`).join('')}
    </select>
    <select class="filter-select" id="fReg" onchange="applyFilter()">
      <option value="all">Todas as regionais</option>
      ${regionais.map(r=>`<option value="${r}"${activeFilters.regional===r?' selected':''}>${r}</option>`).join('')}
    </select>
    <button class="filter-clear" onclick="clearFilters()">Limpar filtros</button>
    <span style="margin-left:auto;font-size:10px;color:#5060a0">${filtered.length} de ${rows.length} registros</span>
  </div>

  <div class="charts-grid-top">
    <div class="chart-box">
      <div class="chart-title">Quantidade por Rodovia e Regional</div>
      <div class="chart-sub">Total de ${unidade} por rodovia, separado por regional</div>
      <div class="legend" id="leg1"></div>
      <div style="position:relative;height:240px"><canvas id="chartRodReg" role="img" aria-label="Por rodovia e regional">Gráfico agrupado por rodovia e regional.</canvas></div>
    </div>
    <div class="chart-box">
      <div class="chart-title">Proporção por Regional</div>
      <div class="chart-sub">Distribuição percentual entre regionais</div>
      <div style="position:relative;height:240px"><canvas id="chartRegPie" role="img" aria-label="Por regional">Rosca por regional.</canvas></div>
    </div>
  </div>

  <div class="charts-grid-bot">
    <div class="chart-box">
      <div class="chart-title">Por Tipo de Serviço</div>
      <div class="chart-sub">Total de ${unidade} por serviço</div>
      <div style="position:relative;height:${Math.max(180, srvList.length*36)}px"><canvas id="chartSrv" role="img" aria-label="Por serviço">Por serviço.</canvas></div>
    </div>
    <div class="chart-box">
      <div class="chart-title">Por Rodovia</div>
      <div class="chart-sub">Comparativo total por rodovia</div>
      <div style="position:relative;height:200px"><canvas id="chartRod" role="img" aria-label="Por rodovia">Por rodovia.</canvas></div>
    </div>
  </div>

  <div class="chart-box">
    <div class="chart-title">Detalhamento por Rodovia, Serviço e Regional</div>
    <div class="chart-sub">Tabela completa dos dados filtrados, agrupada</div>
    <div class="table-wrap">
      <table><thead><tr>
        <th>Rodovia</th><th>Regional</th><th>Serviço</th><th style="text-align:right">${unidade}</th>
      </tr></thead><tbody id="detailBody"></tbody></table>
    </div>
  </div>`;

  // Legenda
  const leg1 = document.getElementById('leg1');
  regList.forEach((reg,i) => {
    const cor = CORES_REG[reg]||CORES_ROD[i%CORES_ROD.length];
    leg1.innerHTML += `<span><span class="ldot" style="background:${cor}"></span>${reg}</span>`;
  });

  // Chart 1: barras agrupadas
  charts.rodReg = new Chart(document.getElementById('chartRodReg'), {
    type:'bar',
    data:{ labels:rodList, datasets: regList.map((reg,i)=>{
      const cor=CORES_REG[reg]||CORES_ROD[i%CORES_ROD.length];
      return { label:reg, data:rodList.map(rod=>byRodReg[rod]?.[reg]||0), backgroundColor:cor+'cc', borderColor:cor, borderWidth:1.5, borderRadius:4 };
    })},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y.toLocaleString('pt-BR')} ${unidade}`}} },
      scales:{ x:{ticks:{color:TC,font:{size:11}},grid:{color:GC}}, y:{ticks:{color:TC,font:{size:11}},grid:{color:GC},beginAtZero:true} }
    }
  });

  // Chart 2: rosca
  const regColors = regList.map((r,i)=>CORES_REG[r]||CORES_ROD[i%CORES_ROD.length]);
  charts.regPie = new Chart(document.getElementById('chartRegPie'), {
    type:'doughnut',
    data:{ labels:regList, datasets:[{ data:regList.map(r=>byReg[r]||0), backgroundColor:regColors.map(c=>c+'cc'), borderColor:regColors, borderWidth:1.5 }] },
    options:{ responsive:true, maintainAspectRatio:false, cutout:'60%',
      plugins:{ legend:{position:'right',labels:{color:TC,font:{size:11},boxWidth:12,padding:10}},
        tooltip:{callbacks:{label:c=>`${c.label}: ${c.parsed.toLocaleString('pt-BR')} ${unidade}`}} }
    }
  });

  // Chart 3: serviços horizontal
  const srvColors = srvList.map((_,i)=>CORES_ROD[i%CORES_ROD.length]);
  charts.srv = new Chart(document.getElementById('chartSrv'), {
    type:'bar',
    data:{ labels:srvList, datasets:[{ data:srvList.map(s=>bySrv[s]||0), backgroundColor:srvColors.map(c=>c+'cc'), borderColor:srvColors, borderWidth:1.5, borderRadius:4 }] },
    options:{ responsive:true, maintainAspectRatio:false, indexAxis:'y',
      plugins:{ legend:{display:false}, tooltip:{callbacks:{label:c=>`${c.parsed.x.toLocaleString('pt-BR')} ${unidade}`}} },
      scales:{ x:{ticks:{color:TC,font:{size:11}},grid:{color:GC},beginAtZero:true}, y:{ticks:{color:TC,font:{size:11}},grid:{color:'transparent'}} }
    }
  });

  // Chart 4: rodovias
  const rodColors = rodList.map((_,i)=>CORES_ROD[i%CORES_ROD.length]);
  charts.rod = new Chart(document.getElementById('chartRod'), {
    type:'bar',
    data:{ labels:rodList, datasets:[{ data:rodList.map(r=>byRod[r]||0), backgroundColor:rodColors.map(c=>c+'cc'), borderColor:rodColors, borderWidth:1.5, borderRadius:4 }] },
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{callbacks:{label:c=>`${c.parsed.y.toLocaleString('pt-BR')} ${unidade}`}} },
      scales:{ x:{ticks:{color:TC,font:{size:11}},grid:{color:GC}}, y:{ticks:{color:TC,font:{size:11}},grid:{color:GC},beginAtZero:true} }
    }
  });

  // Tabela
  const aggTable = {};
  filtered.forEach(r => {
    const k=`${r.rodovia}||${r.regional}||${r.servico}`;
    aggTable[k]=(aggTable[k]||0)+r.medida;
  });
  const tbody = document.getElementById('detailBody');
  Object.entries(aggTable).sort(([a],[b])=>a.localeCompare(b)).forEach(([key,val])=>{
    const [rod,reg,srv]=key.split('||');
    const cls = reg==='Regional 1'?'r1':reg==='Regional 2'?'r2':'r3';
    tbody.innerHTML+=`<tr>
      <td><span class="badge-rod ${cls}">${rod}</span></td>
      <td>${reg}</td><td>${srv}</td>
      <td style="text-align:right;font-weight:600;color:#e8c040">${val.toLocaleString('pt-BR')} ${unidade}</td>
    </tr>`;
  });
}

function applyFilter() {
  activeFilters.rodovia = document.getElementById('fRod').value;
  activeFilters.regional = document.getElementById('fReg').value;
  renderTab();
}
function clearFilters() {
  activeFilters = { rodovia:'all', regional:'all' };
  renderTab();
}

loadAll();
</script>
</body>
</html>
