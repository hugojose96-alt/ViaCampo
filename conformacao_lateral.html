<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Via Campo — Conformação Lateral</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a2070;font-family:'Segoe UI',sans-serif;color:#fff;min-height:100vh}
.header{background:#1e277a;padding:11px 28px;border-bottom:2px solid #3d48c0;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:6px}
.brand-sub{font-size:10px;color:#a0aadd;letter-spacing:2px;text-transform:uppercase;margin-top:1px}
.header-right{text-align:right;font-size:12px;color:#a0aadd}
.header-right strong{display:block;color:#e8c040;font-size:13px}
.subtitle-bar{background:#182060;padding:6px 28px;font-size:10px;color:#5060a0;letter-spacing:2px;text-transform:uppercase;border-bottom:1px solid #2d38b0}
.body{padding:18px 28px}
.status-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px;font-size:12px}
.dot{width:8px;height:8px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.status-text{color:#a0aadd}
.refresh-btn{margin-left:auto;background:rgba(232,192,64,0.15);color:#e8c040;border:1px solid rgba(232,192,64,0.4);border-radius:6px;padding:4px 12px;font-size:11px;cursor:pointer;font-family:'Segoe UI',sans-serif;font-weight:600}
.refresh-btn:hover{background:rgba(232,192,64,0.28)}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.kpi{background:#1e277a;border-radius:9px;padding:12px 14px;border:1px solid #3d48c0}
.kpi-label{font-size:10px;color:#a0aadd;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.kpi-value{font-size:21px;font-weight:700;color:#fff}
.kpi-value span{font-size:12px;font-weight:400;color:#a0aadd;margin-left:3px}
.kpi-badge{display:inline-block;margin-top:3px;font-size:10px;padding:2px 7px;border-radius:20px}
.bg{background:rgba(232,192,64,0.15);color:#e8c040}
.bn{background:rgba(74,222,128,0.15);color:#4ade80}
.br{background:rgba(248,113,113,0.15);color:#f87171}
.bb{background:rgba(96,165,250,0.15);color:#93c5fd}
.cb{background:#1e277a;border-radius:9px;padding:14px 16px;border:1px solid #3d48c0;margin-bottom:16px}
.ct{font-size:11px;font-weight:600;color:#d0d8f0;letter-spacing:.5px;text-transform:uppercase;margin-bottom:2px}
.cs{font-size:10px;color:#7888c0;margin-bottom:10px}
.rod-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.rtab{padding:7px 16px;font-size:11px;font-weight:600;cursor:pointer;border-radius:6px;border:1px solid #3d48c0;color:#7888c0;background:transparent;transition:all .2s;letter-spacing:.5px;text-transform:uppercase}
.rtab.active{color:#e8c040;border-color:#e8c040;background:rgba(232,192,64,0.08)}
.rtab:hover:not(.active){color:#c0c8e8;border-color:#5060a0}
.leg-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:8px;align-items:center}
.leg-item{display:flex;align-items:center;gap:6px;font-size:10px;color:#a0aadd}
.leg-box{width:28px;height:10px;border-radius:2px;flex-shrink:0}
.leg-line{width:28px;height:2px;border-top:2px dashed #e8c040;flex-shrink:0}
.reti-wrap{position:relative;overflow-x:auto;margin-top:4px}
.reti-wrap::-webkit-scrollbar{height:5px}
.reti-wrap::-webkit-scrollbar-track{background:#1a2070}
.reti-wrap::-webkit-scrollbar-thumb{background:#3d48c0;border-radius:3px}
.tt{position:absolute;background:#0d1648f0;border:1px solid #3d48c0;border-radius:7px;padding:7px 11px;font-size:11px;color:#e0e8ff;pointer-events:none;display:none;z-index:30;white-space:nowrap;line-height:1.8;box-shadow:0 4px 18px rgba(0,0,0,.5)}
.pct-section{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:16px}
.pct-card{background:#1e277a;border-radius:9px;padding:12px 16px;border:1px solid #3d48c0}
.pct-rod{font-size:12px;font-weight:700;color:#93c5fd;margin-bottom:6px}
.pct-bar-bg{background:#2d38b0;border-radius:4px;height:10px;overflow:hidden;margin-bottom:5px}
.pct-bar-fill{height:100%;border-radius:4px;background:#4ade80;transition:width .6s ease}
.pct-nums{font-size:10px;color:#a0aadd;display:flex;justify-content:space-between}
.pct-pct{font-size:16px;font-weight:700;color:#4ade80;margin-top:2px}
.loading{display:flex;align-items:center;justify-content:center;height:180px;flex-direction:column;gap:10px;color:#7888c0;font-size:13px}
.spinner{width:28px;height:28px;border:3px solid #2d38b0;border-top-color:#e8c040;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{text-align:center;padding:8px;font-size:11px;color:#8898cc;border-top:1px solid #2d38b0;margin-top:4px;letter-spacing:.5px}
.empty{text-align:center;padding:30px;color:#5060a0;font-size:13px}
</style>
</head>

<div class="header">
  <div class="brand">
    <img style="height:50px;border-radius:6px" id="hLogo" alt="Via Campo">
    <div>
      <div class="brand-sub">Plano de Ação</div>
    </div>
  </div>
  <div class="header-right"><strong id="hDate">—</strong>Planejamento de Obras</div>
</div>
<div class="subtitle-bar">CONFORMAÇÃO LATERAL — DADOS AO VIVO DA PLANILHA</div>

  </div>
  <div id="mc"><div class="loading"><div class="spinner"></div>Carregando dados...</div></div>
</div>
<div class="footer">Via Campo Concessão Rodoviária</div>

// ── Dados ao vivo ─────────────────────────────────────────────────────────────
const CSV_URL = 'https://docs.google.com/spreadsheets/d/1SmaGenbsAEQ4Ic7vTA7YfCug4qcTm2L29FMD8fGbbG0/pub?gid=966218282&single=true&output=csv';
const PROXY_URLS = [CSV_URL];

function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const f = splitCSV(lines[i]);
    if (!f[7] || !f[3] || !f[4]) continue;
    const kmI = parseNum(f[3]);
    const kmF = parseNum(f[4]);
    const m   = parseNum(f[5]);
    if (!kmI && !kmF) continue;
    rows.push({
      data: f[0]?.trim() || '',
      equipe: f[1]?.trim() || '',
      srv:  f[2]?.trim() || '',
      kmI, kmF, m,
      sen:  f[6]?.trim() || '',
      rod:  f[7]?.trim() || '',
      reg:  f[8]?.trim() || '',
      exec: (f[9]?.trim() || '').toLowerCase() === 'x'
    });
  }
  return rows;
}

function splitCSV(line) {
  const r = []; let c = '', q = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { if (q && line[i+1] === '"') { c += '"'; i++; } else q = !q; }
    else if (ch === ',' && !q) { r.push(c.trim()); c = ''; }
    else c += ch;
  }
  r.push(c.trim()); return r;
}

function parseNum(s) {
  if (!s || !s.trim()) return 0;
  return parseFloat(s.replace(/\./g,'').replace(',','.')) || 0;
}

function fmtKm(n) { return n.toFixed(3).replace('.',','); }
function fmtM(n)  { return Math.round(n).toLocaleString('pt-BR'); }

function setSt(ok, msg) {
  document.getElementById('sDot').style.background = ok ? '#4ade80' : '#f87171';
  document.getElementById('sTxt').textContent = msg;
}

let DATA = [];

async function loadAll() {
  setSt(true, 'Carregando...');
  document.getElementById('mc').innerHTML = '<div class="loading"><div class="spinner"></div>Carregando dados...</div>';
  try {
    const r = await fetch(CSV_URL);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const t = await r.text();
    DATA = parseCSV(t);
    setSt(true, `Atualizado ${new Date().toLocaleTimeString('pt-BR')} — ${DATA.length} registros`);
  } catch(e) {
    setSt(false, 'Erro ao carregar: ' + e.message);
    DATA = [];
  }
  render();
}

// ── Render principal ──────────────────────────────────────────────────────────
let SEL_ROD = 'all';

function render() {
  const mc = document.getElementById('mc');
  if (!DATA.length) {
    mc.innerHTML = '<div class="empty">Nenhum dado carregado. Verifique se a planilha está publicada como CSV.</div>';
    return;
  }

  const rods = [...new Set(DATA.map(r => r.rod))].sort();
  const total = DATA.length;
  const execTotal = DATA.filter(r => r.exec).length;
  const mTotal = DATA.reduce((s, r) => s + r.m, 0);
  const mExec  = DATA.filter(r => r.exec).reduce((s, r) => s + r.m, 0);
  const pct = mTotal ? ((mExec / mTotal) * 100).toFixed(1) : '0.0';

  // KPIs
  const kpisHTML = `
  <div class="kpi-row">
    <div class="kpi">
      <div class="kpi-label">Rodovias</div>
      <div class="kpi-value">${rods.length} <span>rodovias</span></div>
      <div class="kpi-badge bb">${rods.join(' · ')}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Total de Trechos</div>
      <div class="kpi-value">${total} <span>trechos</span></div>
      <div class="kpi-badge bg">${execTotal} executados</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Extensão Total</div>
      <div class="kpi-value">${fmtM(mTotal/1000)} <span>km</span></div>
      <div class="kpi-badge bn">${fmtM(mExec/1000)} km exec.</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Progresso Geral</div>
      <div class="kpi-value">${pct} <span>%</span></div>
      <div class="kpi-badge ${parseFloat(pct) >= 50 ? 'bn' : 'br'}">${execTotal}/${total} trechos</div>
    </div>
  </div>`;

  // Tabs de rodovia
  const tabsHTML = `
  <div class="rod-tabs">
    <button class="rtab ${SEL_ROD === 'all' ? 'active' : ''}" onclick="selRod('all',this)">Todas</button>
    ${rods.map(r => `<button class="rtab ${SEL_ROD === r ? 'active' : ''}" onclick="selRod('${r}',this)">${r}</button>`).join('')}
  </div>`;

  // Cards de % por rodovia
  const pctCards = rods.map(rod => {
    const rows = DATA.filter(r => r.rod === rod);
    const mR = rows.reduce((s, r) => s + r.m, 0);
    const mE = rows.filter(r => r.exec).reduce((s, r) => s + r.m, 0);
    const p  = mR ? ((mE / mR) * 100) : 0;
    const ne = rows.filter(r => r.exec).length;
    return `
    <div class="pct-card">
      <div class="pct-rod">${rod}</div>
      <div class="pct-bar-bg"><div class="pct-bar-fill" style="width:${p.toFixed(1)}%"></div></div>
      <div class="pct-nums"><span>${fmtM(mE/1000)} km exec. de ${fmtM(mR/1000)} km</span><span>${ne}/${rows.length} trechos</span></div>
      <div class="pct-pct">${p.toFixed(1)}%</div>
    </div>`;
  }).join('');

  // Retigráficos
  const displayRods = SEL_ROD === 'all' ? rods : [SEL_ROD];
  const retiBlocks = displayRods.map(rod => {
    const rows = DATA.filter(r => r.rod === rod);
    return `
    <div class="cb">
      <div class="ct">Retigráfico — ${rod}</div>
      <div class="cs">Vermelho = trecho planejado (sentido indicado) · Verde = executado · Tracejado = eixo da rodovia</div>
      <div class="leg-row">
        <div class="leg-item"><div class="leg-box" style="background:#f87171"></div> Crescente</div>
        <div class="leg-item"><div class="leg-box" style="background:#fb923c"></div> Decrescente</div>
        <div class="leg-item"><div class="leg-box" style="background:#4ade80"></div> Executado</div>
        <div class="leg-item"><div class="leg-line"></div> Eixo da rodovia</div>
      </div>
      <div class="reti-wrap"><div class="tt" id="tt-${rod.replace(/\W/g,'')}"></div><canvas id="cv-${rod.replace(/\W/g,'')}"></canvas></div>
    </div>`;
  }).join('');

  mc.innerHTML = kpisHTML + tabsHTML + `
  <div class="cb" style="margin-bottom:16px">
    <div class="ct">Percentual Executado por Rodovia</div>
    <div class="cs">Progresso de conformação lateral em cada rodovia</div>
    <div class="pct-section">${pctCards}</div>
  </div>` + retiBlocks;

  // Desenhar canvas após DOM
  requestAnimationFrame(() => {
    displayRods.forEach(rod => drawReti(rod, DATA.filter(r => r.rod === rod)));
  });
}

function selRod(rod, el) {
  SEL_ROD = rod;
  document.querySelectorAll('.rtab').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  render();
}

// ── Retigráfico Canvas ────────────────────────────────────────────────────────
function drawReti(rod, rows) {
  const id = rod.replace(/\W/g, '');
  const cv = document.getElementById('cv-' + id);
  if (!cv) return;

  const dpr = window.devicePixelRatio || 1;
  const W   = Math.max(cv.parentElement.offsetWidth || 800, 600);
  const nSentidos = [...new Set(rows.map(r => r.sen))].length;
  const H   = Math.max(80 + nSentidos * 54, 140);

  cv.width  = W * dpr; cv.height = H * dpr;
  cv.style.width  = W + 'px'; cv.style.height = H + 'px';
  const ctx = cv.getContext('2d');
  ctx.scale(dpr, dpr);

  const ML = 80, MR = 20, MT = 24, MB = 36;
  const CW = W - ML - MR, CH = H - MT - MB;

  const kms = rows.flatMap(r => [r.kmI, r.kmF]).filter(v => v > 0);
  if (!kms.length) return;
  const KM0 = Math.floor(Math.min(...kms));
  const KM1 = Math.ceil(Math.max(...kms));
  const KMR = KM1 - KM0 || 1;
  const toX = km => ML + ((km - KM0) / KMR) * CW;

  ctx.clearRect(0, 0, W, H);

  // Grid vertical
  const step = Math.max(1, Math.ceil(KMR / 12));
  ctx.setLineDash([2, 4]); ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1;
  for (let k = KM0; k <= KM1; k += step) {
    const x = toX(k);
    ctx.beginPath(); ctx.moveTo(x, MT); ctx.lineTo(x, MT + CH); ctx.stroke();
  }
  ctx.setLineDash([]);

  // Eixo KM (base)
  ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(ML, MT + CH); ctx.lineTo(ML + CW, MT + CH); ctx.stroke();

  // Labels KM
  ctx.fillStyle = '#8898cc'; ctx.font = '9px Segoe UI'; ctx.textAlign = 'center';
  for (let k = KM0; k <= KM1; k += step) {
    ctx.fillText(fmtKm(k), toX(k), MT + CH + 13);
  }
  ctx.fillStyle = '#7888c0'; ctx.font = '9px Segoe UI'; ctx.textAlign = 'center';
  ctx.fillText('Km', ML + CW / 2, MT + CH + 24);

  // Sentidos presentes
  const sentidos = [...new Set(rows.map(r => r.sen))].sort();
  const slotH = Math.floor(CH / sentidos.length);
  const LANE_H = Math.min(20, Math.floor(slotH * 0.55));

  sentidos.forEach((sen, si) => {
    const yBase = MT + si * slotH;
    const yMid  = yBase + slotH / 2;

    // Label sentido (esquerda)
    ctx.save();
    ctx.fillStyle = '#a0aadd'; ctx.font = 'bold 9px Segoe UI'; ctx.textAlign = 'right';
    ctx.fillText(rod, ML - 6, yMid - 6);
    ctx.fillStyle = '#7888c0'; ctx.font = '8px Segoe UI';
    ctx.fillText(sen, ML - 6, yMid + 6);
    ctx.restore();

    // Eixo central tracejado (linha amarela)
    ctx.save();
    ctx.setLineDash([8, 5]);
    ctx.strokeStyle = '#e8c040';
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = 0.55;
    ctx.beginPath(); ctx.moveTo(ML, yMid); ctx.lineTo(ML + CW, yMid); ctx.stroke();
    ctx.restore();

    // Trechos desta rodovia/sentido
    const rowsSen = rows.filter(r => r.sen === sen);
    rowsSen.forEach(row => {
      const x1 = toX(row.kmI);
      const x2 = toX(row.kmF);
      const bw  = Math.max(x2 - x1 - 1, 1);
      const y   = yMid - LANE_H / 2;

      // Cor base (não executado): vermelho por sentido
      const isCresc = sen.toLowerCase().includes('cresc');
      const baseClr = isCresc ? '#f87171' : '#fb923c';
      const execClr = '#4ade80';

      ctx.fillStyle = row.exec ? execClr : baseClr;
      ctx.globalAlpha = row.exec ? 0.9 : 0.65;
      ctx.beginPath();
      ctx.roundRect ? ctx.roundRect(x1, y, bw, LANE_H, 2) : ctx.rect(x1, y, bw, LANE_H);
      ctx.fill();
      ctx.globalAlpha = 1;

      // Bordas
      ctx.strokeStyle = row.exec ? '#22c55e' : (isCresc ? '#ef4444' : '#ea580c');
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.roundRect ? ctx.roundRect(x1, y, bw, LANE_H, 2) : ctx.rect(x1, y, bw, LANE_H);
      ctx.stroke();
    });
  });

  // Tooltip
  const tt = document.getElementById('tt-' + id);
  cv.onmousemove = function(e) {
    const rect = cv.getBoundingClientRect();
    const mx = (e.clientX - rect.left);
    const my = (e.clientY - rect.top);
    const km = KM0 + ((mx - ML) / CW) * KMR;

    let found = null;
    sentidos.forEach((sen, si) => {
      const yMid = MT + si * slotH + slotH / 2;
      if (Math.abs(my - yMid) < LANE_H) {
        const r = rows.find(r => r.sen === sen && km >= r.kmI && km <= r.kmF);
        if (r) found = r;
      }
    });

    if (found) {
      tt.style.display = 'block';
      tt.style.left = Math.min(mx + 14, W - 200) + 'px';
      tt.style.top  = Math.max(my - 60, 4) + 'px';
      tt.innerHTML =
        `<b>${found.rod}</b> · ${found.sen}<br>` +
        `Km ${fmtKm(found.kmI)} → ${fmtKm(found.kmF)}<br>` +
        `Extensão: <b>${fmtM(found.m)} m</b><br>` +
        `Status: <b style="color:${found.exec ? '#4ade80' : '#f87171'}">${found.exec ? '✔ Executado' : '✘ Pendente'}</b>` +
        (found.equipe ? `<br>Equipe: ${found.equipe}` : '');
    } else {
      tt.style.display = 'none';
    }
  };
  cv.onmouseleave = () => { if(tt) tt.style.display = 'none'; };
}

// Init
loadAll();
</script>
</body>
</html>
