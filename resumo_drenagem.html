<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Via Campo — Resumo Drenagem Superficial (Reg 1 x Reg 2)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a2070;font-family:'Segoe UI',sans-serif;color:#fff;min-height:100vh}
.header{background:#1e277a;padding:11px 28px;border-bottom:2px solid #3d48c0;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:6px}
.brand-sub{font-size:10px;color:#a0aadd;letter-spacing:2px;text-transform:uppercase;margin-top:1px}
.header-right{text-align:right;font-size:12px;color:#a0aadd}
.header-right strong{display:block;color:#e8c040;font-size:13px}
.body{padding:18px 28px}
.status-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px;font-size:12px}
.dot{width:8px;height:8px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.status-text{color:#a0aadd}
.refresh-btn{margin-left:auto;background:rgba(232,192,64,0.15);color:#e8c040;border:1px solid rgba(232,192,64,0.4);border-radius:6px;padding:4px 12px;font-size:11px;cursor:pointer;font-family:'Segoe UI',sans-serif;font-weight:600}
.refresh-btn:hover{background:rgba(232,192,64,0.28)}
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.kpi{background:#1e277a;border-radius:9px;padding:12px 14px;border:1px solid #3d48c0}
.kpi-label{font-size:10px;color:#a0aadd;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.kpi-value{font-size:21px;font-weight:700;color:#fff}
.kpi-value span{font-size:12px;font-weight:400;color:#a0aadd;margin-left:3px}
.kpi-badge{display:inline-block;margin-top:3px;font-size:10px;padding:2px 7px;border-radius:20px}
.bb{background:rgba(96,165,250,0.15);color:#93c5fd}
.bg{background:rgba(232,192,64,0.15);color:#e8c040}
.bn{background:rgba(74,222,128,0.15);color:#4ade80}
.bp{background:rgba(167,139,250,0.15);color:#a78bfa}
.br{background:rgba(248,113,113,0.15);color:#f87171}
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;background:#1e277a;padding:10px 14px;border-radius:8px;border:1px solid #3d48c0}
.fl{font-size:10px;color:#a0aadd;font-weight:700;letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
select{background:#2B34A0;color:#fff;border:1px solid #4d5cd0;border-radius:6px;padding:5px 9px;font-size:11px;outline:none;cursor:pointer;font-family:'Segoe UI',sans-serif}
select:focus{border-color:#e8c040}
.fc{background:transparent;color:#7888c0;border:1px solid #3d48c0;border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;font-family:'Segoe UI',sans-serif}
.fc:hover{background:#2d38b0;color:#fff}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.cb{background:#1e277a;border-radius:9px;padding:14px 16px;border:1px solid #3d48c0;margin-bottom:12px}
.ct{font-size:11px;font-weight:600;color:#d0d8f0;letter-spacing:.5px;text-transform:uppercase;margin-bottom:2px}
.cs{font-size:10px;color:#7888c0;margin-bottom:8px}
.leg{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:7px}
.leg span{display:flex;align-items:center;gap:4px;font-size:10px;color:#a0aadd}
.ld{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.tw{overflow-y:auto;max-height:280px;border-radius:5px}
.tw::-webkit-scrollbar{width:5px}.tw::-webkit-scrollbar-track{background:#1a2070}.tw::-webkit-scrollbar-thumb{background:#3d48c0;border-radius:3px}
table{width:100%;border-collapse:collapse;font-size:11px}
thead th{background:#16206a;color:#a0aadd;padding:6px 9px;text-align:left;border-bottom:2px solid #2d38b0;font-weight:600;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;position:sticky;top:0;z-index:2}
td{padding:6px 9px;border-bottom:1px solid rgba(255,255,255,0.05);color:#d0d8f0;white-space:nowrap}
tr:hover td{background:rgba(255,255,255,0.03)}
.bs{display:inline-block;padding:1px 8px;border-radius:9px;font-size:10px;font-weight:600}
.r1{background:rgba(96,165,250,0.2);color:#93c5fd}.r2{background:rgba(232,192,64,0.2);color:#e8c040}.ro{background:rgba(167,139,250,0.2);color:#a78bfa}.rp{background:rgba(248,113,113,0.2);color:#f87171}
.pbar-wrap{width:100%;background:rgba(255,255,255,0.08);border-radius:6px;height:8px;overflow:hidden;min-width:90px}
.pbar-fill{height:100%;border-radius:6px}
.loading{display:flex;align-items:center;justify-content:center;height:180px;flex-direction:column;gap:10px;color:#7888c0;font-size:13px}
.spinner{width:28px;height:28px;border:3px solid #2d38b0;border-top-color:#e8c040;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{text-align:center;padding:8px;font-size:11px;color:#8898cc;border-top:1px solid #2d38b0;margin-top:4px;letter-spacing:.5px}
.empty{text-align:center;padding:30px;color:#5060a0;font-size:13px}
@media(max-width:900px){.kpi-row{grid-template-columns:repeat(1,1fr)}.g2{grid-template-columns:1fr}}
</style>
</head>

<div class="header">
  <div class="brand">
    <img style="height:50px;border-radius:6px" id="hLogo" alt="Via Campo">

<div style="background:#182060;padding:6px 28px;font-size:10px;color:#5060a0;letter-spacing:2px;text-transform:uppercase;border-bottom:1px solid #2d38b0">LIMPEZA DE DRENAGEM SUPERFICIAL — RESUMO REG 1 · ATUAL vs REG 2 · ATUAL — DADOS AO VIVO DA PLANILHA</div>

const CSV_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRIH_aAgMAgTnZIFe7mEFx2WxNrZhytatBF5mSveVmhYKLRiq88LXYMQr9RggAnBSwseN-2t-AXPJTi/pub?gid=269296572&single=true&output=csv';
// Colunas: A=0,B=1,C=2(Serviço),D=3(kmIni),E=4(kmFin),F=5(Metragem),G=6(Sentido),H=7(Rodovia),I=8(Regional),J=9(Grau),K=10(Cor),L=11,M=12,N=13(Equipe)
const C={S:2,KI:3,KF:4,M:5,SE:6,RO:7,RE:8,J:9,K:10,EQ:13};
const REG1='Reg 1 - Atual', REG2='Reg 2 - Atual';
let ROWS=[],UN='m',AFrod='all';
const GC='rgba(255,255,255,0.07)',TC='#8898cc';
const CL=['#a78bfa','#fb923c','#4ade80','#60a5fa','#e8c040','#f472b6','#38bdf8','#facc15'];
const COL_R1='#60a5fa',COL_R2='#e8c040',COL_OUT='#a78bfa',COL_PEND='#f87171';
let CH={};

function fmtBR(n){return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,'.');}
function fmtPct(n){return n.toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1})+'%';}
function normEq(s){return (s||'').replace(/\s+/g,' ').trim();}

function sl(l){
  const r=[];let c='',q=false;
  for(let i=0;i<l.length;i++){
    const ch=l[i];
    if(ch==='"'){if(q&&l[i+1]==='"'){c+='"';i++;}else q=!q;}
    else if(ch===','&&!q){r.push(c.trim());c='';}
    else c+=ch;
  }
  r.push(c.trim());return r;
}
function pn(s){
  if(!s||!s.trim())return 0;
  const c=s.replace(/[^\d,\.]/g,'');
  if(c.includes(',')&&c.includes('.'))return parseFloat(c.replace(/\./g,'').replace(',','.'))||0;
  if(c.includes(','))return parseFloat(c.replace(',','.'))||0;
  return parseFloat(c)||0;
}
function parseCSV(txt){
  const lines=txt.replace(/\r\n/g,'\n').replace(/\r/g,'\n').trim().split('\n');
  if(lines.length<2)return{rows:[],hdr:'m'};
  const h=sl(lines[0]);
  const hdr=h[C.M]||'m';
  const rows=[];
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim())continue;
    const c=sl(lines[i]);
    const rod=c[C.RO]||'',reg=c[C.RE]||'',srv=c[C.S]||'';
    if(!rod||!reg||!srv)continue;
    rows.push({srv,med:pn(c[C.M]),kmI:pn(c[C.KI]),kmF:pn(c[C.KF]),sen:c[C.SE]||'',rod,reg,j:c[C.J]||'',k:c[C.K]||'',eq:normEq(c[C.EQ])});
  }
  return{rows,hdr};
}
async function fetchCSV(url){
  const px=[url,'https://corsproxy.io/?'+encodeURIComponent(url),'https://api.allorigins.win/raw?url='+encodeURIComponent(url)];
  for(const u of px){try{const r=await fetch(u);if(!r.ok)continue;const t=await r.text();const d=parseCSV(t);if(d.rows.length)return d;}catch(e){}}
  throw new Error('Falha ao carregar CSV');
}
function setSt(ok,msg){document.getElementById('sDot').style.background=ok?'#4ade80':'#f87171';document.getElementById('sTxt').textContent=msg;}

async function loadAll(){
  setSt(true,'Carregando...');
  document.getElementById('mc').innerHTML='<div class="loading"><div class="spinner"></div>Carregando dados...</div>';
  try{
    const d=await fetchCSV(CSV_URL);
    ROWS=d.rows;UN=d.hdr||'m';
    setSt(true,`Atualizado ${new Date().toLocaleTimeString('pt-BR')} — ${ROWS.length} registros`);
  }catch(e){setSt(false,'Erro: '+e.message);}
  render();
}

function dc(){Object.values(CH).forEach(c=>{try{c.destroy();}catch(e){}});CH={};}
function applyRod(){AFrod=document.getElementById('fRod').value;render();}
function clearRod(){AFrod='all';render();}

function render(){
  dc();
  if(!ROWS.length){document.getElementById('mc').innerHTML='<div class="empty">Sem dados disponíveis.<br>Verifique a publicação da planilha.</div>';return;}

  const rodsAll=[...new Set(ROWS.map(r=>r.rod))].sort();
  const base=AFrod==='all'?ROWS:ROWS.filter(r=>r.rod===AFrod);

  // Meta total = soma de toda a coluna F (no escopo filtrado)
  const totalMeta=base.reduce((a,r)=>a+r.med,0);

  let reg1=0,reg2=0,pendente=0;
  const outras={};
  base.forEach(r=>{
    if(r.eq===REG1)reg1+=r.med;
    else if(r.eq===REG2)reg2+=r.med;
    else if(r.eq){outras[r.eq]=(outras[r.eq]||0)+r.med;}
    else pendente+=r.med;
  });
  const outrasSum=Object.values(outras).reduce((a,b)=>a+b,0);
  const executadoR12=reg1+reg2;
  const pctR12=totalMeta?executadoR12/totalMeta*100:0;
  const pctReg1=totalMeta?reg1/totalMeta*100:0;
  const pctReg2=totalMeta?reg2/totalMeta*100:0;
  const pctOutras=totalMeta?outrasSum/totalMeta*100:0;
  const pctPend=totalMeta?pendente/totalMeta*100:0;

  // Por rodovia: total, reg1, reg2 (sempre sobre TODAS as rodovias, independente do filtro, para o painel comparativo)
  const rodTotal={},rodR1={},rodR2={};
  ROWS.forEach(r=>{
    rodTotal[r.rod]=(rodTotal[r.rod]||0)+r.med;
    if(r.eq===REG1)rodR1[r.rod]=(rodR1[r.rod]||0)+r.med;
    else if(r.eq===REG2)rodR2[r.rod]=(rodR2[r.rod]||0)+r.med;
  });

  const outrasLabels=Object.keys(outras).sort((a,b)=>outras[b]-outras[a]);

  document.getElementById('mc').innerHTML=`
  <div class="filters">
    <span class="fl">Rodovia:</span>
    <select id="fRod" onchange="applyRod()"><option value="all">Todas as rodovias</option>${rodsAll.map(r=>`<option value="${r}"${AFrod===r?' selected':''}>${r}</option>`).join('')}</select>
    <button class="fc" onclick="clearRod()">Limpar</button>
  </div>

  <div class="kpi-row">
    <div class="kpi"><div class="kpi-label">Meta Total (Col. F)</div><div class="kpi-value">${fmtBR(totalMeta)} <span>${UN}</span></div><div class="kpi-badge bp">${base.length} registros</div></div>
    <div class="kpi"><div class="kpi-label">Executado Reg 1+2</div><div class="kpi-value">${fmtBR(executadoR12)} <span>${UN}</span></div><div class="kpi-badge bb">${fmtPct(pctR12)} do total</div></div>
    <div class="kpi"><div class="kpi-label">A Executar</div><div class="kpi-value">${fmtBR(pendente)} <span>${UN}</span></div><div class="kpi-badge br">${fmtPct(pctPend)} do total</div></div>
  </div>

  <div class="g2">
    <div class="cb" style="margin-bottom:0">
      <div class="ct">Distribuição Geral dos Metros</div><div class="cs">% do total de drenagem (${fmtBR(totalMeta)} ${UN}) por situação</div>
      <div style="position:relative;height:230px"><canvas id="cPizza">.</canvas></div>
    </div>
    <div class="cb" style="margin-bottom:0">
      <div class="ct">Reg 1 · Atual vs Reg 2 · Atual</div><div class="cs">Comparativo entre as duas equipes principais</div>
      <div style="position:relative;height:230px"><canvas id="cReg">.</canvas></div>
    </div>
  </div>

  <div class="cb">
    <div class="ct">Reg 1 e Reg 2 por Rodovia</div><div class="cs">Metros executados pelas equipes Reg 1 - Atual e Reg 2 - Atual, por rodovia (todas as rodovias)</div>
    <div style="position:relative;height:220px"><canvas id="cRod">.</canvas></div>
  </div>

  <div class="cb">
    <div class="ct">Resumo por Equipe</div><div class="cs">Detalhamento de metros e percentual sobre a meta total (${fmtBR(totalMeta)} ${UN})</div>
    <div class="tw">
      <table>
        <thead><tr><th>Equipe / Situação</th><th style="text-align:right">Metros (${UN})</th><th style="text-align:right">% do Total</th><th>Progresso</th></tr></thead>
        <tbody id="tbEq"></tbody>
      </table>
    </div>
  </div>

  <div class="cb">
    <div class="ct">Percentual de Execução por Rodovia (Reg 1 + Reg 2)</div><div class="cs">Quanto cada rodovia já teve executado pelas equipes Reg 1/Reg 2 - Atual, sobre a meta daquela rodovia</div>
    <div class="tw">
      <table>
        <thead><tr><th>Rodovia</th><th style="text-align:right">Meta (${UN})</th><th style="text-align:right">Reg 1 (${UN})</th><th style="text-align:right">Reg 2 (${UN})</th><th style="text-align:right">Executado</th><th style="text-align:right">% Executado</th><th>Progresso</th></tr></thead>
        <tbody id="tbRod"></tbody>
      </table>
    </div>
  </div>`;

  // Pizza — distribuição geral
  CH.pizza=new Chart(document.getElementById('cPizza'),{type:'doughnut',data:{
    labels:['Reg 1 - Atual','Reg 2 - Atual','A Executar'],
    datasets:[{data:[reg1,reg2,pendente],backgroundColor:[COL_R1+'cc',COL_R2+'cc',COL_PEND+'cc'],borderColor:[COL_R1,COL_R2,COL_PEND],borderWidth:1.5}]
  },options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{position:'right',labels:{color:TC,font:{size:11},boxWidth:11,padding:9}},tooltip:{callbacks:{label:c=>{const v=c.parsed,p=totalMeta?v/totalMeta*100:0;return `${c.label}: ${fmtBR(v)} ${UN} (${fmtPct(p)})`;}}}}}});

  // Barras Reg1 vs Reg2
  CH.reg=new Chart(document.getElementById('cReg'),{type:'bar',data:{
    labels:['Reg 1 - Atual','Reg 2 - Atual'],
    datasets:[{data:[reg1,reg2],backgroundColor:[COL_R1+'cc',COL_R2+'cc'],borderColor:[COL_R1,COL_R2],borderWidth:1.5,borderRadius:6,barThickness:60}]
  },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>{const v=c.parsed.y,p=totalMeta?v/totalMeta*100:0;return `${fmtBR(v)} ${UN} (${fmtPct(p)} do total)`;}}}},scales:{x:{ticks:{color:TC,font:{size:12,weight:'600'}},grid:{display:false}},y:{ticks:{color:TC,font:{size:11}},grid:{color:GC},beginAtZero:true}}}});

  // Barras por rodovia — Reg1 vs Reg2 (todas as rodovias)
  const RL=rodsAll;
  CH.rod=new Chart(document.getElementById('cRod'),{type:'bar',data:{
    labels:RL,
    datasets:[
      {label:'Reg 1 - Atual',data:RL.map(r=>rodR1[r]||0),backgroundColor:COL_R1+'cc',borderColor:COL_R1,borderWidth:1.5,borderRadius:4},
      {label:'Reg 2 - Atual',data:RL.map(r=>rodR2[r]||0),backgroundColor:COL_R2+'cc',borderColor:COL_R2,borderWidth:1.5,borderRadius:4}
    ]
  },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{color:TC,font:{size:11},boxWidth:11}},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${fmtBR(c.parsed.y)} ${UN}`}}},scales:{x:{ticks:{color:TC,font:{size:11}},grid:{color:GC}},y:{ticks:{color:TC,font:{size:11}},grid:{color:GC},beginAtZero:true}}}});

  // Tabela resumo por equipe
  const tbEq=document.getElementById('tbEq');
  const linhasEq=[
    {nome:'Reg 1 - Atual',v:reg1,cls:'r1',cor:COL_R1},
    {nome:'Reg 2 - Atual',v:reg2,cls:'r2',cor:COL_R2},
    {nome:'A Executar (sem equipe)',v:pendente,cls:'rp',cor:COL_PEND}
  ];
  tbEq.innerHTML=linhasEq.map(l=>{
    const p=totalMeta?l.v/totalMeta*100:0;
    return `<tr><td><span class="bs ${l.cls}">${l.nome}</span></td><td style="text-align:right;font-weight:600;color:#e8c040">${fmtBR(l.v)} ${UN}</td><td style="text-align:right">${fmtPct(p)}</td><td><div class="pbar-wrap"><div class="pbar-fill" style="width:${Math.min(p,100)}%;background:${l.cor}"></div></div></td></tr>`;
  }).join('');

  // Tabela por rodovia
  const tbRod=document.getElementById('tbRod');
  tbRod.innerHTML=RL.map(r=>{
    const meta=rodTotal[r]||0,r1=rodR1[r]||0,r2=rodR2[r]||0,ex=r1+r2,p=meta?ex/meta*100:0;
    return `<tr><td><span class="bs r1">${r}</span></td><td style="text-align:right">${fmtBR(meta)} ${UN}</td><td style="text-align:right">${fmtBR(r1)} ${UN}</td><td style="text-align:right">${fmtBR(r2)} ${UN}</td><td style="text-align:right;font-weight:600;color:#e8c040">${fmtBR(ex)} ${UN}</td><td style="text-align:right">${fmtPct(p)}</td><td><div class="pbar-wrap"><div class="pbar-fill" style="width:${Math.min(p,100)}%;background:#4ade80"></div></div></td></tr>`;
  }).join('');
}

loadAll();
</script>
