<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Via Campo — Plano de Ação</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a2070;font-family:'Segoe UI',sans-serif;color:#fff;min-height:100vh}
.header{background:#1e277a;padding:11px 28px;border-bottom:2px solid #3d48c0;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:6px}
.brand-sub{font-size:10px;color:#a0aadd;letter-spacing:2px;text-transform:uppercase;margin-top:1px}
.header-right{text-align:right;font-size:12px;color:#a0aadd}
.header-right strong{display:block;color:#e8c040;font-size:13px}
.tabs{display:flex;background:#1e277a;border-bottom:2px solid #3d48c0;padding:0 12px 0 28px;overflow-x:auto;flex-wrap:nowrap}
.tabs::-webkit-scrollbar{height:3px}.tabs::-webkit-scrollbar-track{background:#1a2070}.tabs::-webkit-scrollbar-thumb{background:#3d48c0;border-radius:3px}
.tab{padding:11px 16px;font-size:11px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;color:#7888c0;transition:all .2s;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;flex-shrink:0}
.tab.active{color:#e8c040;border-bottom-color:#e8c040}
.tab:hover:not(.active){color:#c0c8e8}
.tab-sep{width:1px;background:#2d38b0;margin:8px 2px;flex-shrink:0;align-self:stretch}
.svc-label{font-size:9px;color:#4050a0;letter-spacing:1.5px;text-transform:uppercase;padding:0 6px;align-self:center;white-space:nowrap;flex-shrink:0}
.body{padding:18px 28px}
.status-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px;font-size:12px}
.dot{width:8px;height:8px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.status-text{color:#a0aadd}
.refresh-btn{margin-left:auto;background:rgba(232,192,64,0.15);color:#e8c040;border:1px solid rgba(232,192,64,0.4);border-radius:6px;padding:4px 12px;font-size:11px;cursor:pointer;font-family:'Segoe UI',sans-serif;font-weight:600}
.refresh-btn:hover{background:rgba(232,192,64,0.28)}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.kpi{background:#1e277a;border-radius:9px;padding:12px 14px;border:1px solid #3d48c0}
.kpi-label{font-size:10px;color:#a0aadd;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.kpi-value{font-size:21px;font-weight:700;color:#fff}
.kpi-value span{font-size:12px;font-weight:400;color:#a0aadd;margin-left:3px}
.kpi-badge{display:inline-block;margin-top:3px;font-size:10px;padding:2px 7px;border-radius:20px}
.bb{background:rgba(96,165,250,0.15);color:#93c5fd}
.bg{background:rgba(232,192,64,0.15);color:#e8c040}
.bn{background:rgba(74,222,128,0.15);color:#4ade80}
.bp{background:rgba(167,139,250,0.15);color:#a78bfa}
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;background:#1e277a;padding:10px 14px;border-radius:8px;border:1px solid #3d48c0}
.fl{font-size:10px;color:#a0aadd;font-weight:700;letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
select{background:#2B34A0;color:#fff;border:1px solid #4d5cd0;border-radius:6px;padding:5px 9px;font-size:11px;outline:none;cursor:pointer;font-family:'Segoe UI',sans-serif}
select:focus{border-color:#e8c040}
.fc{background:transparent;color:#7888c0;border:1px solid #3d48c0;border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;font-family:'Segoe UI',sans-serif}
.fc:hover{background:#2d38b0;color:#fff}
.fcount{margin-left:auto;font-size:10px;color:#5060a0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.cb{background:#1e277a;border-radius:9px;padding:14px 16px;border:1px solid #3d48c0;margin-bottom:12px}
.ct{font-size:11px;font-weight:600;color:#d0d8f0;letter-spacing:.5px;text-transform:uppercase;margin-bottom:2px}
.cs{font-size:10px;color:#7888c0;margin-bottom:8px}
.leg{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:7px}
.leg span{display:flex;align-items:center;gap:4px;font-size:10px;color:#a0aadd}
.ld{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.tw{overflow-y:auto;max-height:300px;border-radius:5px}
.tw::-webkit-scrollbar{width:5px}.tw::-webkit-scrollbar-track{background:#1a2070}.tw::-webkit-scrollbar-thumb{background:#3d48c0;border-radius:3px}
table{width:100%;border-collapse:collapse;font-size:11px}
thead th{background:#16206a;color:#a0aadd;padding:6px 9px;text-align:left;border-bottom:2px solid #2d38b0;font-weight:600;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;position:sticky;top:0;z-index:2}
td{padding:5px 9px;border-bottom:1px solid rgba(255,255,255,0.05);color:#d0d8f0;white-space:nowrap}
tr:hover td{background:rgba(255,255,255,0.03)}
.bs{display:inline-block;padding:1px 6px;border-radius:9px;font-size:10px;font-weight:600}
.r1{background:rgba(96,165,250,0.2);color:#93c5fd}.r2{background:rgba(232,192,64,0.2);color:#e8c040}.r3{background:rgba(74,222,128,0.2);color:#4ade80}
.jdupla{background:rgba(96,165,250,0.2);color:#93c5fd}.jsimples{background:rgba(232,192,64,0.2);color:#e8c040}
.kbranco{background:rgba(255,255,255,0.12);color:#e0e8ff}.kamarelo{background:rgba(250,204,21,0.2);color:#facc15}
.loading{display:flex;align-items:center;justify-content:center;height:180px;flex-direction:column;gap:10px;color:#7888c0;font-size:13px}
.spinner{width:28px;height:28px;border:3px solid #2d38b0;border-top-color:#e8c040;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{text-align:center;padding:8px;font-size:11px;color:#8898cc;border-top:1px solid #2d38b0;margin-top:4px;letter-spacing:.5px}
.empty{text-align:center;padding:30px;color:#5060a0;font-size:13px}
.rw{position:relative;overflow-x:auto}
.tt{position:absolute;background:#0d1648f0;border:1px solid #3d48c0;border-radius:7px;padding:7px 11px;font-size:11px;color:#e0e8ff;pointer-events:none;display:none;z-index:30;white-space:nowrap;line-height:1.7;box-shadow:0 4px 18px rgba(0,0,0,.5)}
.err-box{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.4);border-radius:8px;padding:12px 16px;margin-bottom:14px;font-size:11px;color:#fca5a5;line-height:1.6}
.err-box strong{display:block;color:#f87171;margin-bottom:4px}
.svc-banner{background:#182060;padding:6px 28px;font-size:10px;letter-spacing:2px;text-transform:uppercase;border-bottom:1px solid #2d38b0;color:#5060a0;transition:color .3s}

.pct-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:0}
.pct-card{background:#16206a;border-radius:8px;padding:12px 14px;border:1px solid #2d38b0}
.pct-rod{font-size:13px;font-weight:700;color:#93c5fd;margin-bottom:6px}
.pct-bar-bg{background:#2d38b0;border-radius:4px;height:10px;overflow:hidden;margin-bottom:5px}
.pct-bar-fill{height:100%;border-radius:4px;background:#4ade80;transition:width .6s ease}
.pct-nums{font-size:10px;color:#a0aadd;display:flex;justify-content:space-between;margin-bottom:2px}
.pct-pct{font-size:17px;font-weight:700;color:#4ade80}
.reti-exec-wrap{position:relative;overflow-x:auto}
.reti-exec-wrap::-webkit-scrollbar{height:5px}
.reti-exec-wrap::-webkit-scrollbar-track{background:#1a2070}
.reti-exec-wrap::-webkit-scrollbar-thumb{background:#3d48c0;border-radius:3px}
</style>
</head>

  <div class="header-right"><strong id="hDate">—</strong>Planejamento de Obras</div>
</div>

  <div class="tab-sep"></div>
  <div class="tab" onclick="switchTab('rocada',this)">Roçada Manual</div>
  <div class="tab-sep"></div>

</div>

</div>

function fmtBR(n){return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,'.');}

function sl(l){
  const r=[];let c='',q=false;
  for(let i=0;i<l.length;i++){
    const ch=l[i];
    if(ch==='"'){if(q&&l[i+1]==='"'){c+='"';i++;}else q=!q;}
    else if(ch===','&&!q){r.push(c.trim());c='';}
    else c+=ch;
  }
  r.push(c.trim());return r;
}

function pn(s){
  if(!s||!s.trim())return 0;
  const c=s.replace(/[^\d,\.]/g,'');
  if(c.includes(',')&&c.includes('.'))return parseFloat(c.replace(/\./g,'').replace(',','.'))||0;
  if(c.includes(','))return parseFloat(c.replace(',','.'))||0;
  return parseFloat(c)||0;
}

// ── parseCSV padrão (sin, drenagem, poda, disp) ───────────────────────────────
function parseCSV(txt){
  const lines=txt.replace(/\r\n/g,'\n').replace(/\r/g,'\n').trim().split('\n');
  if(lines.length<2)return{rows:[],hdr:'m²'};
  const h=sl(lines[0]);
  const hdr=h[C.M]||'m²';
  // Detectar coluna "Executado" pelo cabeçalho
  const execIdx=h.findIndex(v=>v.toLowerCase().includes('executado'));
  const rows=[];
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim())continue;
    const c=sl(lines[i]);
    const rod=c[C.RO]||'',reg=c[C.RE]||'',srv=c[C.S]||'';
    if(!rod||!reg||!srv)continue;
    const execVal=execIdx>=0?(c[execIdx]?.trim()||''):'';
    rows.push({srv,med:pn(c[C.M]),kmI:pn(c[C.KI]),kmF:pn(c[C.KF]),sen:c[C.SE]||'',rod,reg,j:c[C.J]||'',k:c[C.K]||'',exec:['x','X','✔','sim','yes'].includes(execVal.toLowerCase())});
  }
  return{rows,hdr};
}

// ── parseCSV roçada (tem colunas m2 e med) ────────────────────────────────────
function parseCSVRocada(txt){

  const lines=txt.replace(/\r\n/g,'\n').replace(/\r/g,'\n').trim().split('\n');
  if(lines.length<2)return{rows:[],hdrM:'m',hdrK:'m²'};
  const h=sl(lines[0]);
  const hdrM=h[C.M]||'m';
  const hdrK=h[C.K]||'m²';
  const execIdxR=h.findIndex(v=>v.toLowerCase().includes('executado'));
  const rows=[];
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim())continue;
    const c=sl(lines[i]);
    const rod=c[C.RO]||'',reg=c[C.RE]||'',srv=c[C.S]||'';
    if(!rod||!reg||!srv)continue;
    const execValR=execIdxR>=0?(c[execIdxR]?.trim()||''):'';
    rows.push({srv,med:pn(c[C.M]),m2:pn(c[C.K]),kmI:pn(c[C.KI]),kmF:pn(c[C.KF]),sen:c[C.SE]||'',rod,reg,j:c[C.J]||'',exec:['x','X','✔','sim','yes'].includes(execValR.toLowerCase())});
  }
  return{rows,hdrM,hdrK};
}

async function fetchCSV(url){
  const proxies=[
    url,
    'https://corsproxy.io/?'+encodeURIComponent(url),
    'https://api.allorigins.win/raw?url='+encodeURIComponent(url),
    'https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(url)
  ];
  let lastErr='';
  for(const u of proxies){
    try{
      const r=await fetch(u,{signal:AbortSignal.timeout(8000)});
      if(!r.ok){lastErr=`HTTP ${r.status}`;continue;}
      const t=await r.text();
      if(t.includes('<!DOCTYPE')||t.includes('<html')){lastErr='Resposta HTML (aba não publicada?)';continue;}
      const d=parseCSV(t);
      if(d.rows.length)return d;
      lastErr='CSV sem registros válidos';
    }catch(e){lastErr=e.message;}
  }
  throw new Error(lastErr||'Todos os proxies falharam');
}

async function loadAll(){
  setSt(true,'Carregando...');
  document.getElementById('mc').innerHTML='<div class="loading"><div class="spinner"></div>Carregando dados...</div>';
  const keys=[['mec',false],['man',false],['drenagem',false],['poda',false],['rocada',true],['disp',false]];
  let total=0;
  for(const [key,isRoc] of keys){
    try{
      const raw=await fetchCSVRaw(CSVS[key]);
      if(isRoc){AD_ROC=parseCSVRocada(raw);total+=AD_ROC?.rows?.length||0;}
      else{AD[key]=parseCSV(raw);total+=AD[key]?.rows?.length||0;}
      ERRS[key]=null;
    }catch(e){ERRS[key]=e.message;}
  }
  const errs=Object.entries(ERRS).filter(([,v])=>v);
  if(total>0){
    setSt(errs.length===0,`Atualizado ${new Date().toLocaleTimeString('pt-BR')} — ${total} registros totais${errs.length?' ⚠':''}`);
  }else{setSt(false,'Erro ao carregar dados');}
  render();
}

async function fetchCSVRaw(url){
  const proxies=[url,'https://corsproxy.io/?'+encodeURIComponent(url),'https://api.allorigins.win/raw?url='+encodeURIComponent(url),'https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(url)];
  let lastErr='';
  for(const u of proxies){
    try{
      const r=await fetch(u,{signal:AbortSignal.timeout(8000)});
      if(!r.ok){lastErr=`HTTP ${r.status}`;continue;}
      const t=await r.text();
      if(t.includes('<!DOCTYPE')||t.includes('<html')){lastErr='Resposta HTML';continue;}
      return t;
    }catch(e){lastErr=e.message;}
  }
  throw new Error(lastErr||'Todos os proxies falharam');
}

// ── Retigráfico com faixas por cor ────────────────────────────────────────────
// Lógica de faixas:
// Pista SIMPLES: crescente (bordo dir) | eixo | decrescente (bordo esq)
// Pista DUPLA: cada sentido tem suas próprias faixas (bordo dir | eixo)
// Cor BRANCO → bordo; Cor AMARELO → eixo (linha divisória)
// Registros agrupados por sentido+cor → cada combo = uma faixa diferente

function buildReti(id,rows){
  const cv=document.getElementById(id);if(!cv)return;
  const dpr=window.devicePixelRatio||1,W=cv.parentElement.offsetWidth||700;

  // Calcula altura necessária por rodovia
  const rodsU=[...new Set(rows.map(r=>r.rod))].sort();
  const LANE_H=14,LANE_GAP=3,ROAD_LABEL=16,BLOCK_PAD=14;

  // Para cada rodovia, calcula quantas faixas tem
  function getFaixas(rod){
    const rs=rows.filter(r=>r.rod===rod);
    const isDupla=rs.some(r=>r.j&&r.j.toLowerCase().includes('dupla'));
    const combos=new Set();
    rs.forEach(r=>{
      const senL=r.sen.toLowerCase();
      const isCant=senL.includes('canteiro');
      const isDec=senL.includes('dec');
      const cor=r.k.toLowerCase().includes('amarelo')?'amarelo':'branco';
      if(isCant){combos.add('cant');}
      else if(isDupla){
        // dupla: cada sentido tem bordo + eixo
        const prefix=isDec?'dec':'cre';
        combos.add(prefix+'_'+cor);
      } else {
        const prefix=isDec?'dec':'cre';
        combos.add(prefix+'_'+cor);
      }
    });
    const nLanes=Math.max(combos.size,2);
    return{nLanes,isDupla,combos};
  }

  const rodInfo={};
  rodsU.forEach(rod=>rodInfo[rod]=getFaixas(rod));
  const totalLanes=rodsU.reduce((s,rod)=>s+rodInfo[rod].nLanes,0);
  const H=Math.max(200,BLOCK_PAD*2+ROAD_LABEL*rodsU.length+totalLanes*(LANE_H+LANE_GAP)+LANE_GAP*rodsU.length*2+60);

  cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';
  const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);
  const ML=76,MR=20,MT=16,MB=46,CW=W-ML-MR,CHH=H-MT-MB;

  const kms=rows.flatMap(r=>[r.kmI,r.kmF]).filter(v=>v>0);
  if(!kms.length){ctx.fillStyle='#5060a0';ctx.font='12px Segoe UI';ctx.textAlign='center';ctx.fillText('Sem dados de km disponíveis',W/2,H/2);return;}
  const KM0=Math.floor(Math.min(...kms)),KM1=Math.ceil(Math.max(...kms)),KMR=KM1-KM0||1;
  const toX=km=>ML+((km-KM0)/KMR)*CW;

  ctx.clearRect(0,0,W,H);
  const step=Math.ceil(KMR/10)||1;
  ctx.setLineDash([3,4]);ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;
  for(let k=KM0;k<=KM1;k+=step){const x=toX(k);ctx.beginPath();ctx.moveTo(x,MT);ctx.lineTo(x,MT+CHH);ctx.stroke();}
  ctx.setLineDash([]);

  // Mapa de faixa → cor visual e label
  // branco crescente = bordo direito crescente → azul claro
  // amarelo crescente = eixo crescente → dourado
  // branco decrescente = bordo esquerdo decrescente → vermelho claro
  // amarelo decrescente = eixo decrescente → laranja
  // canteiro = verde

  function getFaixaConfig(key){
    if(key==='cant') return{cor:'#4ade80',label:'Canteiro',light:'rgba(74,222,128,0.18)'};
    if(key==='cre_branco') return{cor:'#60a5fa',label:'Cres. — Bordo',light:'rgba(96,165,250,0.12)'};
    if(key==='cre_amarelo') return{cor:'#e8c040',label:'Cres. — Eixo',light:'rgba(232,192,64,0.12)'};
    if(key==='dec_branco') return{cor:'#f87171',label:'Decres. — Bordo',light:'rgba(248,113,113,0.12)'};
    if(key==='dec_amarelo') return{cor:'#fb923c',label:'Decres. — Eixo',light:'rgba(251,146,60,0.12)'};
    return{cor:'#a78bfa',label:key,light:'rgba(167,139,250,0.12)'};
  }

  function getRowKey(r){
    const senL=r.sen.toLowerCase();
    if(senL.includes('canteiro'))return'cant';
    const prefix=senL.includes('dec')?'dec':'cre';
    const cor=r.k.toLowerCase().includes('amarelo')?'amarelo':'branco';
    return prefix+'_'+cor;
  }

  let yOff=MT+BLOCK_PAD;

  rodsU.forEach(rod=>{
    const rsRod=rows.filter(r=>r.rod===rod);
    const{combos}=rodInfo[rod];
    const orderedKeys=['cre_branco','cre_amarelo','cant','dec_amarelo','dec_branco'];
    const keys=orderedKeys.filter(k=>combos.has(k));
    // adicionar qualquer outro combo não mapeado
    combos.forEach(k=>{if(!orderedKeys.includes(k))keys.push(k);});

    const blockH=ROAD_LABEL+keys.length*(LANE_H+LANE_GAP);

    // Fundo do bloco da rodovia
    ctx.fillStyle='rgba(255,255,255,0.04)';
    ctx.beginPath();
    if(ctx.roundRect)ctx.roundRect(ML,yOff,CW,blockH,4);
    else ctx.rect(ML,yOff,CW,blockH);
    ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=0.5;
    ctx.beginPath();
    if(ctx.roundRect)ctx.roundRect(ML,yOff,CW,blockH,4);
    else ctx.rect(ML,yOff,CW,blockH);
    ctx.stroke();

    // Label rodovia
    ctx.fillStyle='#93c5fd';ctx.font='bold 10px Segoe UI';ctx.textAlign='end';
    ctx.fillText(rod,ML-5,yOff+ROAD_LABEL/2+4);

    let laneY=yOff+ROAD_LABEL;

    keys.forEach(key=>{
      const cfg=getFaixaConfig(key);

      // Fundo da faixa
      ctx.fillStyle=cfg.light;
      ctx.fillRect(ML,laneY,CW,LANE_H);

      // Label da faixa
      ctx.fillStyle=cfg.cor;ctx.font='7px Segoe UI';ctx.textAlign='end';
      ctx.fillText(cfg.label,ML-2,laneY+LANE_H/2+3);

      // Linha separadora de faixa
      ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=0.5;
      ctx.beginPath();ctx.moveTo(ML,laneY);ctx.lineTo(ML+CW,laneY);ctx.stroke();

      // Desenha os registros desta faixa
      rsRod.filter(r=>getRowKey(r)===key).forEach(r=>{
        if(!r.kmI&&!r.kmF)return;
        const x0=toX(r.kmI),x1=toX(r.kmF),bw=Math.max(x1-x0,3);
        ctx.fillStyle=cfg.cor+'cc';
        ctx.beginPath();
        if(ctx.roundRect)ctx.roundRect(x0,laneY+1,bw,LANE_H-2,2);
        else ctx.rect(x0,laneY+1,bw,LANE_H-2);
        ctx.fill();
        ctx.strokeStyle=cfg.cor;ctx.lineWidth=1;
        ctx.beginPath();
        if(ctx.roundRect)ctx.roundRect(x0,laneY+1,bw,LANE_H-2,2);
        else ctx.rect(x0,laneY+1,bw,LANE_H-2);
        ctx.stroke();
        if(bw>28){
          ctx.fillStyle='#fff';ctx.font='bold 8px Segoe UI';ctx.textAlign='center';
          ctx.fillText(r.k||'—',x0+bw/2,laneY+LANE_H/2+3);
        }
      });

      laneY+=LANE_H+LANE_GAP;
    });

    yOff+=blockH+BLOCK_PAD;
  });

  // Eixo km
  ctx.strokeStyle='rgba(255,255,255,0.18)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(ML,MT+CHH);ctx.lineTo(ML+CW,MT+CHH);ctx.stroke();
  for(let k=KM0;k<=KM1;k+=step){
    const x=toX(k);
    ctx.strokeStyle='rgba(255,255,255,0.18)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,MT+CHH);ctx.lineTo(x,MT+CHH+4);ctx.stroke();
    ctx.fillStyle='#7888c0';ctx.font='9px Segoe UI';ctx.textAlign='center';
    ctx.fillText('km '+k.toFixed(0),x,MT+CHH+14);
  }
  ctx.fillStyle='#5060a0';ctx.font='9px Segoe UI';ctx.textAlign='center';
  ctx.fillText('Quilometragem',ML+CW/2,H-5);

  // Tooltip
  const tt=document.getElementById('tt');
  cv.onmousemove=function(e){
    const rect=cv.getBoundingClientRect();
    const mx=(e.clientX-rect.left)*(W/rect.width);
    const my=(e.clientY-rect.top)*(H/rect.height);
    const km=KM0+((mx-ML)/CW)*KMR;
    const hit=rows.find(r=>km>=r.kmI&&km<=r.kmF);
    if(hit&&mx>=ML&&mx<=ML+CW){
      const kc=hit.k.toLowerCase().includes('amarelo')?'#e8c040':'#e0e8ff';
      const jc=hit.j.toLowerCase().includes('dupla')?'#93c5fd':'#e8c040';
      tt.innerHTML=`<strong style="color:#e8c040">km ${hit.kmI.toFixed(3)} – ${hit.kmF.toFixed(3)}</strong><br>Serviço: ${hit.srv}<br>Sentido: ${hit.sen}<br>Rodovia: ${hit.rod} · Regional: ${hit.reg}<br>Pista: <span style="color:${jc}">${hit.j}</span> · Cor: <span style="color:${kc}">${hit.k}</span><br>Medida: <strong>${fmtBR(hit.med)} m²</strong>`;
      tt.style.display='block';
      const px=(e.clientX-rect.left);
      const py=(e.clientY-rect.top);
      tt.style.left=(px+14)+'px';
      tt.style.top=(py-10)+'px';
    }else tt.style.display='none';
  };
  cv.onmouseleave=()=>tt.style.display='none';
}

function buildRetiRoc(id,rows){
  const cv=document.getElementById(id);if(!cv)return;
  const dpr=window.devicePixelRatio||1,W=cv.parentElement.offsetWidth||700,H=280;
  cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';
  const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);
  const ML=72,MR=20,MT=22,MB=46,CW=W-ML-MR,CHH=H-MT-MB;
  const kms=rows.flatMap(r=>[r.kmI,r.kmF]).filter(v=>v>0);
  if(!kms.length){ctx.fillStyle='#5060a0';ctx.font='12px Segoe UI';ctx.textAlign='center';ctx.fillText('Sem dados de km disponíveis',W/2,H/2);return;}
  const KM0=Math.floor(Math.min(...kms)),KM1=Math.ceil(Math.max(...kms)),KMR=KM1-KM0||1;
  const toX=km=>ML+((km-KM0)/KMR)*CW;
  ctx.clearRect(0,0,W,H);
  const step=Math.ceil(KMR/10)||1;
  ctx.setLineDash([3,4]);ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;
  for(let k=KM0;k<=KM1;k+=step){const x=toX(k);ctx.beginPath();ctx.moveTo(x,MT);ctx.lineTo(x,MT+CHH);ctx.stroke();}
  ctx.setLineDash([]);

  const rods=[...new Set(rows.map(r=>r.rod))].sort();
  const nRods=rods.length;
  const slotH=Math.floor((CHH-10)/nRods);
  const ROAD=10,CANT=8,LANE=Math.max(10,Math.floor((slotH-ROAD-CANT-16)/2));

  rods.forEach((rod,ri)=>{
    const yBase=MT+5+ri*slotH;
    const yMid=yBase+slotH/2;
    ctx.fillStyle='#93c5fd';ctx.font='bold 10px Segoe UI';ctx.textAlign='end';
    ctx.fillText(rod,ML-5,yMid+4);
    const roadTop=yMid-ROAD/2;
    ctx.fillStyle='rgba(255,255,255,0.09)';
    ctx.fillRect(ML,roadTop,CW,ROAD);
    ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=0.5;
    ctx.strokeRect(ML,roadTop,CW,ROAD);
    ctx.setLineDash([8,5]);ctx.strokeStyle='rgba(232,192,64,0.35)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(ML,yMid);ctx.lineTo(ML+CW,yMid);ctx.stroke();
    ctx.setLineDash([]);
    const temCanteiro=rows.some(r=>r.rod===rod&&r.sen.toLowerCase().includes('canteiro'));
    if(temCanteiro){
      const cantH=CANT;
      ctx.fillStyle='rgba(74,222,128,0.25)';
      ctx.fillRect(ML,yMid-cantH/2,CW,cantH);
      ctx.strokeStyle='rgba(74,222,128,0.5)';ctx.lineWidth=1;
      ctx.strokeRect(ML,yMid-cantH/2,CW,cantH);
      ctx.fillStyle='rgba(74,222,128,0.7)';ctx.font='8px Segoe UI';ctx.textAlign='center';
      ctx.fillText('CANTEIRO',ML+CW/2,yMid+3);
    }
    const rowsRod=rows.filter(r=>r.rod===rod);
    rowsRod.forEach(r=>{
      if(!r.kmI&&!r.kmF)return;
      const x0=toX(r.kmI),x1=toX(r.kmF),bw=Math.max(x1-x0,3);
      const senLow=r.sen.toLowerCase();
      const isCant=senLow.includes('canteiro');
      const isDec=senLow.includes('dec');
      const jColors={'Alto':'#f87171','Médio':'#fb923c','medio':'#fb923c','Leve':'#4ade80','leve':'#4ade80','alto':'#f87171'};
      let cor,yOff,bh;
      if(isCant){
        cor='#4ade80';yOff=-(CANT/2+1);bh=CANT-2;
        ctx.fillStyle=cor+'99';
        ctx.beginPath();ctx.roundRect(x0,yMid+yOff,bw,bh,2);ctx.fill();
        ctx.strokeStyle=cor;ctx.lineWidth=1;
        ctx.beginPath();ctx.roundRect(x0,yMid+yOff,bw,bh,2);ctx.stroke();
        if(bw>22){ctx.fillStyle='#fff';ctx.font='bold 9px Segoe UI';ctx.textAlign='center';ctx.fillText('↔',x0+bw/2,yMid+yOff+bh/2+3);}
        return;
      }
      // Cor por grau
      cor=jColors[r.j]||(isDec?'#f87171':'#60a5fa');
      bh=LANE;
      yOff=isDec?(ROAD/2+3):-(ROAD/2+bh+3);
      ctx.fillStyle=cor+'bb';
      ctx.beginPath();ctx.roundRect(x0,yMid+yOff,bw,bh,3);ctx.fill();
      ctx.strokeStyle=cor;ctx.lineWidth=1;
      ctx.beginPath();ctx.roundRect(x0,yMid+yOff,bw,bh,3);ctx.stroke();
      if(bw>20){ctx.fillStyle='#fff';ctx.font='bold 10px Segoe UI';ctx.textAlign='center';ctx.fillText(isDec?'←':'→',x0+bw/2,yMid+yOff+bh/2+4);}
    });
    ctx.font='8px Segoe UI';ctx.textAlign='start';
    ctx.fillStyle='#60a5fa';ctx.fillText('Crescente →',ML+3,yMid-ROAD/2-LANE-5);
    ctx.fillStyle='#f87171';ctx.fillText('← Decrescente',ML+3,yMid+ROAD/2+LANE+12);
    if(temCanteiro){ctx.fillStyle='#4ade80';ctx.fillText('↔ Canteiro',ML+CW/2+30,yMid+4);}
  });

  ctx.strokeStyle='rgba(255,255,255,0.18)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(ML,MT+CHH);ctx.lineTo(ML+CW,MT+CHH);ctx.stroke();
  for(let k=KM0;k<=KM1;k+=step){
    const x=toX(k);
    ctx.strokeStyle='rgba(255,255,255,0.18)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,MT+CHH);ctx.lineTo(x,MT+CHH+4);ctx.stroke();
    ctx.fillStyle='#7888c0';ctx.font='9px Segoe UI';ctx.textAlign='center';
    ctx.fillText('km '+k.toFixed(0),x,MT+CHH+14);
  }
  ctx.fillStyle='#5060a0';ctx.font='9px Segoe UI';ctx.textAlign='center';
  ctx.fillText('Quilometragem',ML+CW/2,H-5);

  const tt=document.getElementById('tt');
  cv.onmousemove=function(e){
    const rect=cv.getBoundingClientRect();
    const mx=e.clientX-rect.left;
    const km=KM0+((mx-ML)/CW)*KMR;
    const hit=rows.find(r=>km>=r.kmI&&km<=r.kmF);
    if(hit&&mx>=ML&&mx<=ML+CW){
      const isSen=hit.sen.toLowerCase().includes('canteiro');
      const jc=hit.j==='Alto'?'#f87171':hit.j.includes('dio')?'#fb923c':'#4ade80';
      tt.innerHTML=`<strong style="color:#e8c040">km ${hit.kmI.toFixed(3)} – ${hit.kmF.toFixed(3)}</strong><br>Serviço: ${hit.srv}<br>Sentido: <span style="color:${isSen?'#4ade80':hit.sen.toLowerCase().includes('dec')?'#f87171':'#60a5fa'}">${hit.sen}</span><br>Rodovia: ${hit.rod}<br>Regional: ${hit.reg}<br>Grau: <span style="color:${jc}">${hit.j}</span><br>m: <strong>${fmtBR(hit.med)} m</strong><br>m²: <strong>${fmtBR(hit.m2)} m²</strong>`;
      tt.style.display='block';
      tt.style.left=(mx+14)+'px';
      tt.style.top=(e.clientY-rect.top-10)+'px';
    }else tt.style.display='none';
  };
  cv.onmouseleave=()=>tt.style.display='none';
}

    ${rods.map(r=>`<button class="rtab${AR===r?' active':''}" onclick="switchRod('${r}',this)" style="padding:6px 14px;font-size:11px;font-weight:600;cursor:pointer;border-radius:6px;border:1px solid #4d5cd0;background:${AR===r?'#2B34A0':'transparent'};color:${AR===r?'#e8c040':'#7888c0'};transition:all .2s;font-family:'Segoe UI',sans-serif">${r}</button>`).join('')}
  </div>

  <div class="kpi-row">
    <div class="kpi"><div class="kpi-label">Total ${un}</div><div class="kpi-value">${fmtBR(totM)} <span>${un}</span></div><div class="kpi-badge bb">${rows.length} registros</div></div>
    <div class="kpi"><div class="kpi-label">Filtrado ${un}</div><div class="kpi-value">${fmtBR(filM)} <span>${un}</span></div><div class="kpi-badge bg">${fil.length} registros</div></div>
    <div class="kpi"><div class="kpi-label">Rodovias</div><div class="kpi-value">${rods.length} <span>rodovias</span></div><div class="kpi-badge bn">${rods.join(', ')}</div></div>
    <div class="kpi"><div class="kpi-label">Regionais</div><div class="kpi-value">${regs.length} <span>regionais</span></div><div class="kpi-badge bp">${regs.join(' · ')}</div></div>
  </div>

  <div class="cb">
    <div class="ct">Progresso por Rodovia</div>
    <div class="cs">Percentual executado por rodovia com base na medida</div>
    <div class="pct-grid" id="progCards"></div>
  </div>

  <div class="cb">
    <div class="ct">Retigráfico de Execução</div>
    <div class="cs">
      <span style="color:#4ade80">&#9632;</span> Executado &nbsp;
      <span style="color:#f87171">&#9632;</span> Pendente &nbsp;
      <span style="color:#4ade80">&#9632;</span> Canteiro executado &nbsp;
      <span style="color:#f87171">&#9632;</span> Canteiro pendente &nbsp;
      <span style="color:#e8c040">— —</span> Eixo
      &nbsp;· Passe o mouse para detalhes
    </div>
    <div class="reti-exec-wrap"><div class="tt" id="tt-exec"></div><canvas id="cv-exec"></canvas></div>
  </div>

  <div class="g2">
    <div class="cb" style="margin-bottom:0">
      <div class="ct">Pista por Rodovia</div><div class="cs">Distribuição Dupla/Simples por rodovia</div>
      <div class="leg" id="leg1"></div>
      <div style="position:relative;height:200px"><canvas id="cRR">.</canvas></div>
    </div>
    <div class="cb" style="margin-bottom:0">
      <div class="ct">Proporção por Regional</div><div class="cs">Distribuição percentual</div>
      <div style="position:relative;height:200px"><canvas id="cPie">.</canvas></div>
    </div>
  </div>

  <div class="cb" style="margin-top:12px">
    <div class="ct">Comparativo por Rodovia</div><div class="cs">Total de ${un} por rodovia</div>
    <div style="position:relative;height:160px"><canvas id="cRod">.</canvas></div>
  </div>

  <div class="cb">
    <div class="ct">Detalhamento Completo — Disp. Auxiliares</div><div class="cs">Tabela com scroll — ${fil.length} registros filtrados</div>
    <div class="tw">
      <table>
        <thead><tr><th>Rodovia</th><th>Regional</th><th>Serviço</th><th>Sentido</th><th>km Ini</th><th>km Fin</th><th>Pista</th><th style="text-align:right">${un}</th></tr></thead>
        <tbody id="tb"></tbody>
      </table>
    </div>
  </div>`;

  requestAnimationFrame(()=>{buildRetiExec('cv-exec','tt-exec',fil);const pcEl=document.getElementById('progCards');if(pcEl)pcEl.innerHTML=buildProgCards(rows,un);});

  // Legenda por pista
  const jL=[...new Set(fil.map(r=>r.j).filter(Boolean))].sort();
  const leg1=document.getElementById('leg1');
  jL.forEach((j,i)=>{const cor=pistaColors[j]||CL[i%CL.length];leg1.innerHTML+=`<span><span class="ld" style="background:${cor}"></span>${j}</span>`;});

  // Barras agrupadas por pista por rodovia
  const bRRJ={};fil.forEach(r=>{if(!bRRJ[r.rod])bRRJ[r.rod]={};bRRJ[r.rod][r.j]=(bRRJ[r.rod][r.j]||0)+r.med;});
  CH.rr=new Chart(document.getElementById('cRR'),{type:'bar',data:{labels:RL,datasets:jL.map((j,i)=>{const cor=pistaColors[j]||CL[i%CL.length];return{label:j,data:RL.map(r=>bRRJ[r]?.[j]||0),backgroundColor:cor+'cc',borderColor:cor,borderWidth:1.5,borderRadius:4};})},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${fmtBR(c.parsed.y)} ${un}`}}},scales:{x:{ticks:{color:TC,font:{size:11}},grid:{color:GC}},y:{ticks:{color:TC,font:{size:11}},grid:{color:GC},beginAtZero:true}}}});

  const rc=reL.map((r,i)=>CR[r]||CL[i%CL.length]);
  CH.pie=new Chart(document.getElementById('cPie'),{type:'doughnut',data:{labels:reL,datasets:[{data:reL.map(r=>bReg[r]||0),backgroundColor:rc.map(c=>c+'cc'),borderColor:rc,borderWidth:1.5}]},options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{position:'right',labels:{color:TC,font:{size:11},boxWidth:11,padding:9}},tooltip:{callbacks:{label:c=>`${c.label}: ${fmtBR(c.parsed)} ${un}`}}}}});

  const rc2=RL.map((_,i)=>CL[i%CL.length]);
  CH.rod=new Chart(document.getElementById('cRod'),{type:'bar',data:{labels:RL,datasets:[{data:RL.map(r=>bRod[r]||0),backgroundColor:rc2.map(c=>c+'cc'),borderColor:rc2,borderWidth:1.5,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${fmtBR(c.parsed.y)} ${un}`}}},scales:{x:{ticks:{color:TC,font:{size:11}},grid:{color:GC}},y:{ticks:{color:TC,font:{size:11}},grid:{color:GC},beginAtZero:true}}}});

  const tb=document.getElementById('tb');
  fil.forEach(r=>{
    const rc=r.reg==='Regional 1'?'r1':r.reg==='Regional 2'?'r2':'r3';
    const jc=r.j.toLowerCase().includes('dupla')?'jdupla':'jsimples';
    const senColor=r.sen.toLowerCase().includes('canteiro')?'#4ade80':r.sen.toLowerCase().includes('dec')?'#f87171':'#60a5fa';
    tb.innerHTML+=`<tr>
      <td><span class="bs ${rc}">${r.rod}</span></td>
      <td>${r.reg}</td><td>${r.srv}</td>
      <td><span style="color:${senColor}">${r.sen}</span></td>
      <td>${r.kmI.toFixed(3)}</td><td>${r.kmF.toFixed(3)}</td>
      <td><span class="bs ${jc}">${r.j}</span></td>
      <td style="text-align:right;font-weight:600;color:#e8c040">${fmtBR(r.med)} ${un}</td>
    </tr>`;
  });
}


function buildRetiExec(id,ttId,rows){
  const cv=document.getElementById(id);if(!cv)return;
  const dpr=window.devicePixelRatio||1,W=cv.parentElement.offsetWidth||700;
  const ML=72,MR=20,MT=22,MB=46,CW=W-ML-MR;

  const rods=[...new Set(rows.map(r=>r.rod))].sort();
  const nRods=rods.length;
  const ROAD=10,CANT=8,LANE=18;
  // altura: por rodovia = ROAD + 2*LANE + CANT + margens
  const slotH=ROAD+2*LANE+CANT+20;
  const CHH=nRods*slotH+10;
  const H=MT+CHH+MB;

  cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';
  const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);

  const kms=rows.flatMap(r=>[r.kmI,r.kmF]).filter(v=>v>0);
  if(!kms.length){
    ctx.fillStyle='#5060a0';ctx.font='12px Segoe UI';ctx.textAlign='center';
    ctx.fillText('Sem dados de km disponíveis',W/2,H/2);return;
  }
  const KM0=Math.floor(Math.min(...kms)),KM1=Math.ceil(Math.max(...kms)),KMR=KM1-KM0||1;
  const toX=km=>ML+((km-KM0)/KMR)*CW;

  ctx.clearRect(0,0,W,H);
  const step=Math.ceil(KMR/10)||1;
  ctx.setLineDash([3,4]);ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;
  for(let k=KM0;k<=KM1;k+=step){const x=toX(k);ctx.beginPath();ctx.moveTo(x,MT);ctx.lineTo(x,MT+CHH);ctx.stroke();}
  ctx.setLineDash([]);

  rods.forEach((rod,ri)=>{
    const yBase=MT+5+ri*slotH;
    const yMid=yBase+slotH/2;

    // Label rodovia
    ctx.fillStyle='#93c5fd';ctx.font='bold 10px Segoe UI';ctx.textAlign='end';
    ctx.fillText(rod,ML-5,yMid+4);

    // Faixa central (rodovia)
    const roadTop=yMid-ROAD/2;
    ctx.fillStyle='rgba(255,255,255,0.09)';ctx.fillRect(ML,roadTop,CW,ROAD);
    ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=0.5;ctx.strokeRect(ML,roadTop,CW,ROAD);

    // Eixo tracejado
    ctx.setLineDash([8,5]);ctx.strokeStyle='rgba(232,192,64,0.35)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(ML,yMid);ctx.lineTo(ML+CW,yMid);ctx.stroke();
    ctx.setLineDash([]);

    // Canteiro (fundo)
    const temCanteiro=rows.some(r=>r.rod===rod&&r.sen.toLowerCase().includes('canteiro'));
    if(temCanteiro){
      ctx.fillStyle='rgba(74,222,128,0.15)';ctx.fillRect(ML,yMid-CANT/2,CW,CANT);
      ctx.strokeStyle='rgba(74,222,128,0.4)';ctx.lineWidth=0.8;ctx.strokeRect(ML,yMid-CANT/2,CW,CANT);
      ctx.fillStyle='rgba(74,222,128,0.6)';ctx.font='8px Segoe UI';ctx.textAlign='center';
      ctx.fillText('CANTEIRO',ML+CW/2,yMid+3);
    }

    // Trechos
    const rowsRod=rows.filter(r=>r.rod===rod);
    rowsRod.forEach(r=>{
      if(!r.kmI&&!r.kmF)return;
      const x0=toX(r.kmI),x1=toX(r.kmF),bw=Math.max(x1-x0,3);
      const senLow=r.sen.toLowerCase();
      const isCant=senLow.includes('canteiro');
      const isDec=senLow.includes('dec');

      // cor: verde se executado, vermelho se pendente
      const cor=r.exec?'#4ade80':'#f87171';
      const brd=r.exec?'#22c55e':'#ef4444';

      let yOff,bh;
      if(isCant){
        yOff=-(CANT/2+1);bh=CANT-2;
      } else {
        bh=LANE;
        yOff=isDec?(ROAD/2+3):-(ROAD/2+bh+3);
      }

      ctx.globalAlpha=r.exec?0.92:0.72;
      ctx.fillStyle=cor;
      ctx.beginPath();
      if(ctx.roundRect)ctx.roundRect(x0,yMid+yOff,bw,bh,2);else ctx.rect(x0,yMid+yOff,bw,bh);
      ctx.fill();
      ctx.globalAlpha=1;
      ctx.strokeStyle=brd;ctx.lineWidth=0.8;
      ctx.beginPath();
      if(ctx.roundRect)ctx.roundRect(x0,yMid+yOff,bw,bh,2);else ctx.rect(x0,yMid+yOff,bw,bh);
      ctx.stroke();

      if(!isCant&&bw>20){
        ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='bold 9px Segoe UI';ctx.textAlign='center';
        ctx.fillText(isDec?'←':'→',x0+bw/2,yMid+yOff+bh/2+4);
      }
    });

    // Labels de sentido
    ctx.font='8px Segoe UI';ctx.textAlign='start';
    ctx.fillStyle='#a0aadd';ctx.fillText('Crescente →',ML+3,yMid-ROAD/2-LANE-4);
    ctx.fillStyle='#a0aadd';ctx.fillText('← Decrescente',ML+3,yMid+ROAD/2+LANE+12);
    if(temCanteiro){ctx.fillStyle='#4ade80';ctx.fillText('↔ Canteiro',ML+CW/2+30,yMid+3);}
  });

  // Eixo km
  ctx.strokeStyle='rgba(255,255,255,0.18)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(ML,MT+CHH);ctx.lineTo(ML+CW,MT+CHH);ctx.stroke();
  for(let k=KM0;k<=KM1;k+=step){
    const x=toX(k);
    ctx.strokeStyle='rgba(255,255,255,0.18)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,MT+CHH);ctx.lineTo(x,MT+CHH+4);ctx.stroke();
    ctx.fillStyle='#7888c0';ctx.font='9px Segoe UI';ctx.textAlign='center';
    ctx.fillText('km '+k.toFixed(0),x,MT+CHH+14);
  }
  ctx.fillStyle='#5060a0';ctx.font='9px Segoe UI';ctx.textAlign='center';
  ctx.fillText('Quilometragem',ML+CW/2,H-5);

  // Tooltip
  const tt=document.getElementById(ttId);if(!tt)return;
  cv.onmousemove=function(e){
    const rect=cv.getBoundingClientRect();
    const mx=e.clientX-rect.left,my=e.clientY-rect.top;
    const km=KM0+((mx-ML)/CW)*KMR;
    const hit=rows.find(r=>km>=r.kmI&&km<=r.kmF);
    if(hit&&mx>=ML&&mx<=ML+CW){
      tt.style.display='block';
      tt.style.left=Math.min(mx+14,W-220)+'px';tt.style.top=Math.max(my-60,4)+'px';
      const dataObj=AT==='rocada'?AD_ROC:AD[AT];
      const un=dataObj?.hdr||dataObj?.hdrM||'m';
      tt.innerHTML=`<b style="color:#93c5fd">${hit.rod}</b> · ${hit.sen}<br>`+
        `Km <b>${hit.kmI.toFixed(3)}</b> → <b>${hit.kmF.toFixed(3)}</b><br>`+
        `${un}: <b style="color:#e8c040">${fmtBR(hit.med)}</b><br>`+
        `Status: <b style="color:${hit.exec?'#4ade80':'#f87171'}">${hit.exec?'✔ Executado':'✘ Pendente'}</b>`;
    }else{tt.style.display='none';}
  };
  cv.onmouseleave=()=>{if(tt)tt.style.display='none';};
}

function buildProgCards(rows,un){
  const rods=[...new Set(rows.map(r=>r.rod))].sort();
  return rods.map(rod=>{
    const allRod=rows.filter(r=>r.rod===rod);
    const totR=allRod.reduce((a,r)=>a+r.med,0);
    const execR=allRod.filter(r=>r.exec).reduce((a,r)=>a+r.med,0);
    const pct=totR?((execR/totR)*100):0;
    const ne=allRod.filter(r=>r.exec).length;
    return `<div class="pct-card"><div class="pct-rod">${rod}</div><div class="pct-bar-bg"><div class="pct-bar-fill" style="width:${Math.min(pct,100).toFixed(1)}%"></div></div><div class="pct-nums"><span>${fmtBR(execR)} ${un} exec. / ${fmtBR(totR)} ${un} total</span><span>${ne}/${allRod.length}</span></div><div class="pct-pct">${pct.toFixed(1)}%</div></div>`;
  }).join('');
}

loadAll();
</script>
