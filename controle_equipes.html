<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Via Campo — Controle de Equipes</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a2070;font-family:'Segoe UI',sans-serif;color:#fff;min-height:100vh}
.header{background:#1e277a;padding:11px 28px;border-bottom:2px solid #3d48c0;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:6px}
.brand-sub{font-size:10px;color:#a0aadd;letter-spacing:2px;text-transform:uppercase;margin-top:1px}
.header-right{text-align:right;font-size:12px;color:#a0aadd}
.header-right strong{display:block;color:#e8c040;font-size:13px}
.body{padding:18px 28px}
.status-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px;font-size:12px}
.dot{width:8px;height:8px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite;flex-shrink:0}
.dot.err{background:#f87171;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.status-text{color:#a0aadd}
.refresh-btn{margin-left:auto;background:rgba(232,192,64,0.15);color:#e8c040;border:1px solid rgba(232,192,64,0.4);border-radius:6px;padding:4px 12px;font-size:11px;cursor:pointer;font-family:'Segoe UI',sans-serif;font-weight:600}
.refresh-btn:hover{background:rgba(232,192,64,0.28)}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.kpi{background:#1e277a;border-radius:9px;padding:12px 14px;border:1px solid #3d48c0}
.kpi-label{font-size:10px;color:#a0aadd;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.kpi-value{font-size:21px;font-weight:700;color:#fff}
.kpi-value span{font-size:12px;font-weight:400;color:#a0aadd;margin-left:3px}
.kpi-badge{display:inline-block;margin-top:3px;font-size:10px;padding:2px 7px;border-radius:20px}
.bb{background:rgba(96,165,250,0.15);color:#93c5fd}
.bg{background:rgba(232,192,64,0.15);color:#e8c040}
.bn{background:rgba(74,222,128,0.15);color:#4ade80}
.bp{background:rgba(167,139,250,0.15);color:#a78bfa}
.br{background:rgba(248,113,113,0.15);color:#f87171}
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;background:#1e277a;padding:10px 14px;border-radius:8px;border:1px solid #3d48c0}
.fl{font-size:10px;color:#a0aadd;font-weight:700;letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
select{background:#2B34A0;color:#fff;border:1px solid #4d5cd0;border-radius:6px;padding:5px 9px;font-size:11px;outline:none;cursor:pointer;font-family:'Segoe UI',sans-serif}
select:focus{border-color:#e8c040}
.fc{background:transparent;color:#7888c0;border:1px solid #3d48c0;border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;font-family:'Segoe UI',sans-serif}
.fc:hover{background:#2d38b0;color:#fff}
.fcount{margin-left:auto;font-size:10px;color:#5060a0}
.cb{background:#1e277a;border-radius:9px;padding:14px 16px;border:1px solid #3d48c0;margin-bottom:12px}
.ct{font-size:11px;font-weight:600;color:#d0d8f0;letter-spacing:.5px;text-transform:uppercase;margin-bottom:2px}
.cs{font-size:10px;color:#7888c0;margin-bottom:8px}
.tw{overflow-y:auto;max-height:340px;border-radius:5px}
.tw::-webkit-scrollbar{width:5px}.tw::-webkit-scrollbar-track{background:#1a2070}.tw::-webkit-scrollbar-thumb{background:#3d48c0;border-radius:3px}
table{width:100%;border-collapse:collapse;font-size:11px}
thead th{background:#16206a;color:#a0aadd;padding:6px 9px;text-align:left;border-bottom:2px solid #2d38b0;font-weight:600;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;position:sticky;top:0;z-index:2}
td{padding:5px 9px;border-bottom:1px solid rgba(255,255,255,0.05);color:#d0d8f0;white-space:nowrap}
tr:hover td{background:rgba(255,255,255,0.03)}
.bs{display:inline-block;padding:1px 6px;border-radius:9px;font-size:10px;font-weight:600}
.r1{background:rgba(96,165,250,0.2);color:#93c5fd}.r2{background:rgba(232,192,64,0.2);color:#e8c040}
.fOficial{background:rgba(96,165,250,0.2);color:#93c5fd}.fLider{background:rgba(167,139,250,0.2);color:#a78bfa}.fAjudante{background:rgba(251,146,60,0.2);color:#fb923c}
.pbar{width:100%;min-width:70px;height:8px;background:#141a5c;border-radius:4px;overflow:hidden}
.pbar i{display:block;height:100%;border-radius:4px}
.pctcell{display:flex;align-items:center;gap:8px}
.pctnum{font-weight:700;min-width:34px;text-align:right}
.loading{display:flex;align-items:center;justify-content:center;height:180px;flex-direction:column;gap:10px;color:#7888c0;font-size:13px}
.spinner{width:28px;height:28px;border:3px solid #2d38b0;border-top-color:#e8c040;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{text-align:center;padding:8px;font-size:11px;color:#8898cc;border-top:1px solid #2d38b0;margin-top:4px;letter-spacing:.5px}
.empty{text-align:center;padding:30px;color:#5060a0;font-size:13px}
</style>
</head>

  <div class="brand">

// A=0 Serial | B=1 Equipe | C=2 Data | D=3 Oficial(real) | E=4 Líder(real) | F=5 Ajudante(real) | G=6 Equipes(mestre) | H=7 Oficial(esp) | I=8 Líder(esp) | J=9 Ajudante(esp)

let AD=null, AF={equipe:'all',data:'all'};
const ROLES=[{k:'oficial',lbl:'Oficial',cls:'fOficial'},{k:'lider',lbl:'Líder de Equipe',cls:'fLider'},{k:'ajudante',lbl:'Ajudante',cls:'fAjudante'}];

function sl(l){
  const r=[];let c='',q=false;
  for(let i=0;i<l.length;i++){
    const ch=l[i];
    if(ch==='"'){if(q&&l[i+1]==='"'){c+='"';i++;}else q=!q;}
    else if(ch===','&&!q){r.push(c.trim());c='';}
    else c+=ch;
  }
  r.push(c.trim());return r;
}
function pn(s){if(!s||!s.trim())return 0;const c=s.replace(/[^\d,.\-]/g,'');if(c.includes(',')&&c.includes('.'))return parseFloat(c.replace(/\./g,'').replace(',','.'))||0;if(c.includes(','))return parseFloat(c.replace(',','.'))||0;return parseFloat(c)||0;}
function norm(s){return (s||'').toLowerCase().replace(/-/g,' ').replace(/\s+/g,' ').trim();}
function parseData(s){const m=/^(\d{2})\/(\d{2})\/(\d{4})$/.exec((s||'').trim());if(!m)return null;return new Date(+m[3],+m[2]-1,+m[1]);}
function regional(nome){const m=/^(Reg\s*\d+)/i.exec(nome||'');return m?m[1].replace(/\s+/g,' '):'—';}

async function loadAll(){
  document.getElementById('sDot').className='dot';
  document.getElementById('sTxt').textContent='Conectando...';
  document.getElementById('mc').innerHTML='<div class="loading"><div class="spinner"></div>Carregando dados...</div>';
  try{
    const res=await fetch(CSV_URL+'&t='+Date.now());
    if(!res.ok)throw new Error('HTTP '+res.status);
    const txt=await res.text();
    const lines=txt.split('\n').map(l=>l.replace(/\r$/,'')).filter(l=>l.trim().length);

    const master={};   // norm(nome) -> {nome,oficial,lider,ajudante}
    const registros=[]; // {serial,equipe,dataStr,dataObj,oficial,lider,ajudante}

    lines.forEach(line=>{
      const f=sl(line);
      const dataObj=parseData(f[2]);
      if(dataObj && f[1] && f[1].trim()){
        registros.push({serial:f[0],equipe:f[1].trim(),dataStr:f[2].trim(),dataObj,oficial:pn(f[3]),lider:pn(f[4]),ajudante:pn(f[5])});
      }
      if(f[6] && f[6].trim()){
        const nome=f[6].trim();
        master[norm(nome)]={nome,oficial:pn(f[7]),lider:pn(f[8]),ajudante:pn(f[9])};
      }
    });

    AD={master,registros};
    document.getElementById('sDot').className='dot';
    document.getElementById('sTxt').textContent=`Conectado — ${registros.length} registros · ${Object.keys(master).length} equipes no quadro · atualizado às ${new Date().toLocaleTimeString('pt-BR')}`;
    render();
  }catch(err){
    document.getElementById('sDot').className='dot err';
    document.getElementById('sTxt').textContent='Erro ao carregar: '+err.message;
    document.getElementById('mc').innerHTML='<div class="empty">Não foi possível carregar a planilha.<br>Verifique se o link publicado ainda está válido.</div>';
  }
}

function compute(){
  const {master,registros}=AD;
  const stats={}; // nomeCanonico -> {regional,total,divergente,faltando:{oficial,lider,ajudante},sobrando:{...}}
  const faltas=[]; // detalhamento

  registros.forEach(r=>{
    const mm=master[norm(r.equipe)];
    if(!mm)return;
    const canon=mm.nome;
    if(!stats[canon])stats[canon]={regional:regional(canon),total:0,divergente:0,faltando:{oficial:0,lider:0,ajudante:0},sobrando:{oficial:0,lider:0,ajudante:0}};
    const st=stats[canon];
    st.total++;
    let anyDif=false;
    ROLES.forEach(ro=>{
      const real=r[ro.k], esp=mm[ro.k];
      if(real<esp){
        anyDif=true; st.faltando[ro.k]++;
        faltas.push({dataStr:r.dataStr,dataObj:r.dataObj,equipe:canon,regional:regional(canon),role:ro.lbl,roleCls:ro.cls,real,esp,faltando:esp-real,serial:r.serial});
      }else if(real>esp){
        anyDif=true; st.sobrando[ro.k]++;
      }
    });
    if(anyDif)st.divergente++;
  });

  faltas.sort((a,b)=>b.dataObj-a.dataObj || a.equipe.localeCompare(b.equipe));
  return {stats,faltas};
}

function pctColor(p){return p===0?'#4ade80':p<34?'#4ade80':p<67?'#fb923c':'#f87171';}

function render(){
  if(!AD||!AD.registros.length){document.getElementById('mc').innerHTML='<div class="empty">Sem dados disponíveis.<br>Verifique a publicação da planilha.</div>';return;}
  const {stats,faltas}=compute();
  const equipes=Object.keys(stats).sort();
  const datas=[...new Set(AD.registros.map(r=>r.dataStr))].sort((a,b)=>parseData(b)-parseData(a));

  // Filtros aplicados ao detalhamento de faltas
  const faltasF=faltas.filter(f=>(AF.equipe==='all'||f.equipe===AF.equipe)&&(AF.data==='all'||f.dataStr===AF.data));

  // KPIs
  const totalEquipes=equipes.length;
  const totalDias=equipes.reduce((a,e)=>a+stats[e].total,0);
  const totalDivergentes=equipes.reduce((a,e)=>a+stats[e].divergente,0);
  const pctGeral=totalDias?Math.round(totalDivergentes/totalDias*1000)/10:0;
  const ranking=equipes.map(e=>({nome:e,...stats[e],pct:stats[e].total?Math.round(stats[e].divergente/stats[e].total*1000)/10:0}))
    .sort((a,b)=>b.pct-a.pct||b.total-a.total);
  const maisDivergente=ranking[0];
  const maisConsistente=[...ranking].sort((a,b)=>a.pct-b.pct||b.total-a.total)[0];

  document.getElementById('mc').innerHTML=`
  <div class="kpi-row">
    <div class="kpi"><div class="kpi-label">Equipes no quadro</div><div class="kpi-value">${totalEquipes} <span>equipes</span></div><div class="kpi-badge bb">${totalDias} dias-equipe analisados</div></div>
    <div class="kpi"><div class="kpi-label">% Geral com divergência</div><div class="kpi-value">${pctGeral}<span>%</span></div><div class="kpi-badge ${pctGeral>66?'br':pctGeral>33?'bg':'bn'}">${totalDivergentes} de ${totalDias} dias</div></div>
    <div class="kpi"><div class="kpi-label">Equipe mais consistente</div><div class="kpi-value" style="font-size:14px">${maisConsistente?maisConsistente.nome:'—'}</div><div class="kpi-badge bn">${maisConsistente?maisConsistente.pct:0}% divergente</div></div>
    <div class="kpi"><div class="kpi-label">Equipe mais divergente</div><div class="kpi-value" style="font-size:14px">${maisDivergente?maisDivergente.nome:'—'}</div><div class="kpi-badge br">${maisDivergente?maisDivergente.pct:0}% divergente</div></div>
  </div>

  <div class="filters">
    <span class="fl">Filtros (detalhamento de faltas):</span>
    <select id="fEquipe" onchange="applyF()"><option value="all">Todas as equipes</option>${equipes.map(e=>`<option value="${e}"${AF.equipe===e?' selected':''}>${e}</option>`).join('')}</select>
    <select id="fData" onchange="applyF()"><option value="all">Todas as datas</option>${datas.map(d=>`<option value="${d}"${AF.data===d?' selected':''}>${d}</option>`).join('')}</select>
    <button class="fc" onclick="clearF()">Limpar</button>
    <span class="fcount">${faltasF.length} de ${faltas.length} faltas</span>
  </div>

  <div class="cb">
    <div class="ct">% de Dias com Efetivo Divergente por Equipe</div>
    <div class="cs">Comparação entre efetivo real (D/E/F) e quadro de referência (H/I/J) · barra = % de dias divergentes</div>
    <div style="position:relative;height:${Math.max(220,ranking.length*22)}px"><canvas id="cRank">.</canvas></div>
  </div>

  <div class="cb">
    <div class="ct">Ranking por Equipe</div><div class="cs">${ranking.length} equipes · ordenado por % de divergência</div>
    <div class="tw">
      <table>
        <thead><tr><th>Equipe</th><th>Regional</th><th>Dias analisados</th><th>Dias divergentes</th><th>% Divergente</th><th>Ajudante faltou</th><th>Oficial faltou</th></tr></thead>
        <tbody>${ranking.map(r=>`<tr>
          <td>${r.nome}</td>
          <td><span class="bs ${r.regional==='Reg 1'?'r1':'r2'}">${r.regional}</span></td>
          <td>${r.total}</td>
          <td>${r.divergente}</td>
          <td><div class="pctcell"><div class="pbar"><i style="width:${r.pct}%;background:${pctColor(r.pct)}"></i></div><span class="pctnum" style="color:${pctColor(r.pct)}">${r.pct}%</span></div></td>
          <td>${r.faltando.ajudante}x</td>
          <td>${r.faltando.oficial}x</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>
  </div>

  <div class="cb">
    <div class="ct">Detalhamento de Faltas por Dia</div><div class="cs">Casos em que o efetivo real ficou abaixo do quadro de referência · ${faltasF.length} registros</div>
    <div class="tw">
      <table>
        <thead><tr><th>Data</th><th>Equipe</th><th>Regional</th><th>Função</th><th>Real</th><th>Esperado</th><th>Faltando</th></tr></thead>
        <tbody>${faltasF.length?faltasF.map(f=>`<tr>
          <td>${f.dataStr}</td>
          <td>${f.equipe}</td>
          <td><span class="bs ${f.regional==='Reg 1'?'r1':'r2'}">${f.regional}</span></td>
          <td><span class="bs ${f.roleCls}">${f.role}</span></td>
          <td>${f.real}</td>
          <td>${f.esp}</td>
          <td style="font-weight:700;color:#f87171">-${f.faltando}</td>
        </tr>`).join(''):'<tr><td colspan="7" style="text-align:center;color:#5060a0;padding:20px">Nenhuma falta encontrada para o filtro selecionado.</td></tr>'}</tbody>
      </table>
    </div>
  </div>`;

  const ctx=document.getElementById('cRank');
  if(ctx){
    new Chart(ctx,{type:'bar',data:{labels:ranking.map(r=>r.nome),datasets:[{data:ranking.map(r=>r.pct),backgroundColor:ranking.map(r=>pctColor(r.pct)+'cc'),borderColor:ranking.map(r=>pctColor(r.pct)),borderWidth:1.5,borderRadius:4}]},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.parsed.x}% dos dias divergentes`}}},
      scales:{x:{min:0,max:100,ticks:{color:'#8898cc',font:{size:10},callback:v=>v+'%'},grid:{color:'rgba(255,255,255,0.07)'}},y:{ticks:{color:'#8898cc',font:{size:10}},grid:{display:false}}}}});
  }
}

function applyF(){AF.equipe=document.getElementById('fEquipe').value;AF.data=document.getElementById('fData').value;render();}
function clearF(){AF={equipe:'all',data:'all'};render();}
loadAll();
</script>
</body>
</html>
